<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destiny Springs | Hub Matrix</title>
    <!-- System Engines -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=JetBrains+Mono:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ═══════════════════════════════════════════════════════
           INDUSTRIAL STEAMPUNK COMMAND TERMINAL
           ═══════════════════════════════════════════════════════ */
        :root {
            --charcoal: #1a1a1b;
            --accent: #b87333;
            --accent-dark: #8b5a2b;
            --accent-soft: rgba(184, 115, 51, 0.3);
            --accent-glow: rgba(184, 115, 51, 0.6);
            --highlight: #00f3ff;
            --highlight-glow: rgba(0, 243, 255, 0.8);
            --rivet-color: #5a4a3a;
            --panel-edge: #2a2a2b;
            --bg-top: #2a1a1a;
            --bg-mid: #1a1a1b;
            --bg-bottom: #0a0a0b;
            --panel-start: rgba(26, 26, 27, 0.98);
            --panel-end: rgba(35, 30, 28, 0.95);
            --texture-layer: repeating-linear-gradient(135deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 2px, transparent 2px, transparent 6px);
            --text-primary: #e0e0e0;
            --text-muted: #8a8a8a;
            --text-soft: #a7a7a7;
            --surface-1: rgba(255, 255, 255, 0.05);
            --surface-2: rgba(255, 255, 255, 0.08);
            --surface-3: rgba(0, 0, 0, 0.32);
            --border-muted: rgba(255, 255, 255, 0.12);
            --critical: #e11d48;
            --critical-soft: rgba(225, 29, 72, 0.2);
            --success: #22c55e;
            --space-1: 0.4rem;
            --space-2: 0.7rem;
            --space-3: 1rem;
            --space-4: 1.4rem;
            --space-5: 1.9rem;
            --radius-soft: 10px;
            --radius-panel: 14px;
        }

        body[data-theme="aurora"] {
            --accent: #7dd3fc;
            --accent-dark: #0369a1;
            --accent-soft: rgba(125, 211, 252, 0.28);
            --accent-glow: rgba(56, 189, 248, 0.55);
            --highlight: #6ee7b7;
            --highlight-glow: rgba(110, 231, 183, 0.6);
            --rivet-color: #1f4f5f;
            --panel-edge: #0f3442;
            --bg-top: #091726;
            --bg-mid: #07111b;
            --bg-bottom: #03080e;
            --panel-start: rgba(7, 18, 28, 0.97);
            --panel-end: rgba(11, 33, 47, 0.94);
            --texture-layer: radial-gradient(circle at 10% 20%, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0) 3px), radial-gradient(circle at 70% 80%, rgba(125,211,252,0.08) 0px, rgba(125,211,252,0) 4px);
            --text-primary: #e0f2fe;
            --text-muted: #93c5fd;
            --critical: #fb7185;
            --critical-soft: rgba(251, 113, 133, 0.22);
            --success: #34d399;
        }

        body[data-theme="daybreak"] {
            --accent: #f97316;
            --accent-dark: #c2410c;
            --accent-soft: rgba(249, 115, 22, 0.24);
            --accent-glow: rgba(249, 115, 22, 0.45);
            --highlight: #facc15;
            --highlight-glow: rgba(250, 204, 21, 0.5);
            --rivet-color: #7c4b1d;
            --panel-edge: #854d0e;
            --bg-top: #3b1f12;
            --bg-mid: #1f140f;
            --bg-bottom: #120c09;
            --panel-start: rgba(38, 23, 17, 0.96);
            --panel-end: rgba(63, 34, 17, 0.92);
            --texture-layer: linear-gradient(180deg, rgba(255,186,120,0.05), transparent), repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 5px);
            --text-primary: #fff7ed;
            --text-muted: #fdba74;
            --critical: #ef4444;
            --critical-soft: rgba(239, 68, 68, 0.2);
            --success: #84cc16;
        }

        body[data-theme="midnight"] {
            --accent: #a78bfa;
            --accent-dark: #6d28d9;
            --accent-soft: rgba(167, 139, 250, 0.24);
            --accent-glow: rgba(167, 139, 250, 0.42);
            --highlight: #22d3ee;
            --highlight-glow: rgba(34, 211, 238, 0.55);
            --rivet-color: #312e81;
            --panel-edge: #1e1b4b;
            --bg-top: #120f25;
            --bg-mid: #0a1020;
            --bg-bottom: #05070f;
            --panel-start: rgba(11, 15, 30, 0.97);
            --panel-end: rgba(25, 20, 53, 0.93);
            --texture-layer: repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 4px), radial-gradient(circle at 80% 20%, rgba(167,139,250,0.08) 0px, rgba(167,139,250,0) 120px);
            --text-primary: #e9e7ff;
            --text-muted: #c4b5fd;
            --critical: #f43f5e;
            --critical-soft: rgba(244, 63, 94, 0.2);
            --success: #10b981;
        }

        body[data-theme="walnut"] {
            --accent: #d4a373;
            --accent-dark: #8d5a2b;
            --accent-soft: rgba(212, 163, 115, 0.26);
            --accent-glow: rgba(212, 163, 115, 0.45);
            --highlight: #f2cc8f;
            --highlight-glow: rgba(242, 204, 143, 0.48);
            --rivet-color: #6f4e37;
            --panel-edge: #4f321e;
            --bg-top: #3d291b;
            --bg-mid: #2b1d14;
            --bg-bottom: #1b120c;
            --panel-start: rgba(52, 33, 22, 0.96);
            --panel-end: rgba(40, 25, 17, 0.94);
            --texture-layer: repeating-linear-gradient(12deg, rgba(255,219,172,0.07) 0px, rgba(255,219,172,0.07) 2px, rgba(122,75,39,0.08) 2px, rgba(122,75,39,0.08) 5px, transparent 5px, transparent 10px);
            --text-primary: #f7eadf;
            --text-muted: #ddb892;
            --critical: #f87171;
            --critical-soft: rgba(248, 113, 113, 0.2);
            --success: #84cc16;
        }

        body[data-theme="slatework"] {
            --accent: #94a3b8;
            --accent-dark: #475569;
            --accent-soft: rgba(148, 163, 184, 0.24);
            --accent-glow: rgba(148, 163, 184, 0.36);
            --highlight: #67e8f9;
            --highlight-glow: rgba(103, 232, 249, 0.42);
            --rivet-color: #475569;
            --panel-edge: #1f2937;
            --bg-top: #202935;
            --bg-mid: #121a24;
            --bg-bottom: #0a0f16;
            --panel-start: rgba(23, 31, 43, 0.96);
            --panel-end: rgba(14, 21, 31, 0.94);
            --texture-layer: radial-gradient(circle at 20% 30%, rgba(148,163,184,0.05) 0px, rgba(148,163,184,0) 3px), radial-gradient(circle at 60% 65%, rgba(148,163,184,0.05) 0px, rgba(148,163,184,0) 3px), repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 6px);
            --text-primary: #e2e8f0;
            --text-muted: #94a3b8;
            --critical: #fb7185;
            --critical-soft: rgba(251, 113, 133, 0.18);
            --success: #22c55e;
        }

        body[data-theme="linen"] {
            --accent: #c9915d;
            --accent-dark: #915f36;
            --accent-soft: rgba(201, 145, 93, 0.25);
            --accent-glow: rgba(201, 145, 93, 0.34);
            --highlight: #6ee7b7;
            --highlight-glow: rgba(110, 231, 183, 0.36);
            --rivet-color: #8b7355;
            --panel-edge: #5c4c3a;
            --bg-top: #f3eee6;
            --bg-mid: #e5dccf;
            --bg-bottom: #d7ccb9;
            --panel-start: rgba(243, 238, 230, 0.95);
            --panel-end: rgba(226, 215, 198, 0.92);
            --texture-layer: repeating-linear-gradient(0deg, rgba(140,113,86,0.06) 0px, rgba(140,113,86,0.06) 1px, transparent 1px, transparent 4px), repeating-linear-gradient(90deg, rgba(140,113,86,0.04) 0px, rgba(140,113,86,0.04) 1px, transparent 1px, transparent 5px);
            --text-primary: #3c2f25;
            --text-muted: #7c6148;
            --text-soft: #6b5643;
            --surface-1: rgba(255, 255, 255, 0.45);
            --surface-2: rgba(255, 255, 255, 0.62);
            --surface-3: rgba(130, 95, 64, 0.12);
            --border-muted: rgba(123, 97, 72, 0.35);
            --critical: #dc2626;
            --critical-soft: rgba(220, 38, 38, 0.16);
            --success: #15803d;
        }

        /* Linen uses a bright background, so force stronger text contrast. */
        body[data-theme="linen"] [class*="text-white"] {
            color: #2f241b !important;
        }

        body[data-theme="linen"] .panel-input {
            background: rgba(255, 255, 255, 0.58);
            border-color: rgba(123, 97, 72, 0.4);
            color: #2f241b;
        }

        body[data-theme="linen"] .panel-input::placeholder {
            color: #7c6148;
        }

        .report-field-input {
            color: var(--text-primary);
        }

        .report-field-input::placeholder {
            color: var(--text-muted);
            opacity: 0.95;
        }

        body[data-theme="linen"] .report-field-input {
            background: rgba(255, 255, 255, 0.55);
            border-radius: 4px;
            padding: 6px;
        }
        
        * {
            font-family: 'JetBrains Mono', 'Courier New', monospace !important;
        }

        h1, h2, h3, .display-type {
            font-family: 'Chakra Petch', 'JetBrains Mono', monospace !important;
            letter-spacing: 0.02em;
            line-height: 1.08;
        }

        .copy-rhythm {
            line-height: 1.45;
        }

        .modal-content-flow > * + * {
            margin-top: var(--space-3);
        }

        .modal-content-flow-tight > * + * {
            margin-top: var(--space-2);
        }

        .section-kicker {
            font-size: 10px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-weight: 900;
            color: var(--accent);
        }
        
        body {
            background: var(--texture-layer), radial-gradient(ellipse at top, var(--bg-top) 0%, var(--bg-mid) 50%, var(--bg-bottom) 100%) !important;
            color: var(--text-primary) !important;
            overflow: hidden;
            transition: background 0.25s ease, color 0.25s ease;
        }
        
        /* ═══ RIVETS & INDUSTRIAL DECORATIONS ═══ */
        .rivet {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #6a5a4a, var(--rivet-color) 60%, #3a2a1a);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.2);
        }
        
        /* ═══ INDUSTRIAL METAL PANELS ═══ */
        .glass-panel {
            background: linear-gradient(135deg, var(--panel-start) 0%, var(--panel-end) 100%);
            border: 2px solid var(--accent);
            border-radius: var(--radius-panel);
            position: relative;
            box-shadow: 
                0 0 20px var(--accent-glow),
                inset 0 2px 0 rgba(255, 255, 255, 0.1),
                inset 0 -2px 5px rgba(0, 0, 0, 0.6);
        }
        
        .glass-panel::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid var(--accent-soft);
            pointer-events: none;
        }
        
        .neon-blue {
            border: 2px solid var(--highlight);
            box-shadow: 0 0 28px var(--highlight-glow), 0 6px 24px rgba(0,0,0,0.6);
        }
        
        .neon-fuchsia {
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px var(--accent-glow), 0 6px 24px rgba(0,0,0,0.6);
        }
        
        .holo-text {
            text-shadow: 0 0 12px var(--highlight), 0 0 3px var(--accent);
        }
        
        /* ═══ MECHANICAL LEVER SWITCHES (BUTTONS) ═══ */
        .fancy-btn {
            background: linear-gradient(145deg, var(--accent), var(--accent-dark));
            color: #1a1a1b;
            border: 2px solid var(--accent);
            border-radius: 6px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            position: relative;
            box-shadow: 
                0 4px 0 var(--accent-dark),
                0 8px 20px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.1s;
        }
        
        .fancy-btn::before {
            content: '';
            position: absolute;
            inset: -4px;
            border: 2px solid var(--highlight);
            border-radius: 8px;
            opacity: 0;
            animation: borderGlow 2s ease-in-out infinite;
        }
        
        @keyframes borderGlow {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.6; box-shadow: 0 0 20px var(--highlight-glow); }
        }
        
        .fancy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 6px 0 var(--accent-dark),
                0 12px 30px var(--accent-glow);
        }
        
        .fancy-btn:active {
            transform: translateY(2px);
            box-shadow: 
                0 2px 0 var(--accent-dark),
                0 4px 10px rgba(0, 0, 0, 0.8);
        }

        .panel-input {
            width: 100%;
            background: rgba(10, 10, 12, 0.85);
            border: 2px solid var(--accent-soft);
            border-radius: var(--radius-soft);
            padding: 0.85rem 0.95rem;
            color: var(--text-primary);
            outline: none;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .panel-input:focus {
            border-color: var(--highlight);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.04), 0 0 18px var(--highlight-glow);
        }

        .data-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border-radius: 999px;
            padding: 0.22rem 0.65rem;
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            font-weight: 900;
            border: 1px solid var(--border-muted);
            background: var(--surface-1);
            color: var(--text-primary);
        }

        .surface-card {
            background: linear-gradient(135deg, var(--surface-1), var(--surface-3));
            border: 1px solid var(--border-muted);
            border-radius: 12px;
        }

        .soft-text {
            color: var(--text-soft);
        }

        .modal-action-row {
            position: sticky;
            top: 0;
            z-index: 6;
            padding-top: 8px;
            padding-bottom: 8px;
            background: linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0));
            backdrop-filter: blur(2px);
        }

        .modal-footer-sticky {
            position: sticky;
            bottom: 0;
            z-index: 6;
            padding-top: 10px;
            background: linear-gradient(0deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
        }

        button.text-4xl.leading-none,
        button.text-5xl.font-light,
        button.text-5xl.font-light.leading-none,
        button.absolute.top-4.right-4.text-2xl {
            min-width: 44px;
            min-height: 44px;
            padding: 6px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .modal-surface {
            animation: modalFadeIn 0.2s ease-out;
        }

        .modal-card-enter {
            animation: modalCardEnter 0.24s ease-out;
            transform-origin: center top;
        }

        .hover-lift {
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }

        .hover-lift:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35);
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes modalCardEnter {
            from { opacity: 0; transform: translateY(12px) scale(0.985); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .theme-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1rem;
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }

        .theme-card:hover {
            transform: translateY(-2px);
        }

        .theme-card.active {
            border-color: var(--highlight);
            box-shadow: 0 0 20px var(--highlight-glow);
        }

        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.2rem 0.5rem;
            border-radius: 999px;
            font-size: 0.62rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 900;
        }

        .role-badge.admin {
            background: var(--critical-soft);
            color: #fecdd3;
            border: 1px solid rgba(251, 113, 133, 0.25);
        }

        .role-badge.staff {
            background: rgba(34, 211, 238, 0.14);
            color: #cffafe;
            border: 1px solid rgba(34, 211, 238, 0.2);
        }
        
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes shrink {
            from { width: 100%; }
            to { width: 0%; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .animate-pulse {
            animation: pulse 2.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .app-shell {
            min-height: 100vh;
        }

        .nav-rail {
            flex-shrink: 0;
        }

        .work-area {
            min-height: 0;
        }

        .report-sidebar {
            flex-shrink: 0;
        }

        .main-content {
            min-width: 0;
        }

        .top-header {
            gap: 0.7rem;
        }

        @media (max-width: 1200px) {
            .top-header {
                flex-wrap: wrap;
                align-items: flex-start;
            }

            .top-header > .header-actions {
                width: 100%;
                justify-content: flex-start;
                flex-wrap: wrap;
            }
        }

        @media (max-width: 900px) {
            .app-shell {
                display: block;
                height: auto;
                overflow: auto;
            }

            .nav-rail {
                width: 100%;
                min-height: auto;
                border-right: none !important;
                border-bottom: 1px solid var(--accent-soft);
                flex-direction: row;
                overflow-x: auto;
                padding: 0.6rem;
                gap: 0.5rem;
                justify-content: flex-start;
            }

            .nav-rail > button,
            .nav-rail > div {
                flex: 0 0 auto;
            }

            .main-stack {
                width: 100%;
            }

            .top-header {
                padding: 0.6rem;
                gap: 0.5rem;
            }

            .work-area {
                display: block;
                height: auto;
            }

            .report-sidebar {
                width: 100%;
                border-right: none !important;
                border-bottom: 1px solid var(--accent-soft);
                max-height: none;
            }

            .main-content {
                padding: 0.9rem !important;
            }

            .header-actions {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                gap: 0.45rem;
            }

            .header-actions .data-chip,
            .header-actions button,
            .header-actions .role-badge {
                font-size: 10px;
            }

            .main-content .grid.grid-cols-7 {
                min-width: 760px;
            }
        }

        @media (max-width: 640px) {
            .top-header input,
            .main-content input,
            .main-content select {
                font-size: 12px !important;
            }

            .main-content h2 {
                font-size: 2rem !important;
            }

            .main-content .fancy-btn {
                padding: 8px 10px !important;
                font-size: 10px !important;
                min-height: 42px;
            }

            .report-sidebar .fancy-btn {
                font-size: 9px !important;
                padding: 7px 8px !important;
                min-height: 38px;
            }

            .header-actions > button,
            .header-actions > .data-chip,
            .nav-rail > button {
                min-height: 42px;
                min-width: 42px;
            }

            .top-header {
                position: sticky;
                top: 0;
                z-index: 15;
                backdrop-filter: blur(8px);
            }

            .modal-card-enter {
                width: 100%;
                max-width: 100%;
            }
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .glass-panel, .neon-blue, .neon-fuchsia {
                background: white !important;
                color: black !important;
                border: 1px solid #333 !important;
                box-shadow: none !important;
            }
            .calendar-grid .bg-cyan-600\/80, .calendar-grid .bg-rose-600\/80, .calendar-grid .bg-fuchsia-600\/80, .calendar-grid .bg-blue-600\/80, .calendar-grid .bg-slate-700 {
                color: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .calendar-grid .bg-cyan-600\/80 { background: #06b6d4 !important; }

            async function syncCalendlyEvents(dateStr = selectedDate) {
                if (!calendlyAuthToken) {
                    showNotification('Please authenticate with Calendly first.', 'error');
                    return;
                }

                const date = new Date(`${dateStr}T00:00:00`);
                const dayStart = date.toISOString();
                const dayEnd = new Date(date.getTime() + 24 * 60 * 60 * 1000).toISOString();

                showNotification(`Syncing visitation schedule for ${dateStr}...`, 'info');

                try {
                    const response = await fetch(`https://api.calendly.com/scheduled_events?min_start_time=${encodeURIComponent(dayStart)}&max_start_time=${encodeURIComponent(dayEnd)}&count=100`, {
                        headers: {
                            Authorization: `Bearer ${calendlyAuthToken}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    if (!response.ok) {
                        throw new Error(`Calendly request failed (${response.status})`);
                    }

                    const payload = await response.json();
                    const collection = Array.isArray(payload?.collection) ? payload.collection : [];
                    const visits = collection.map((evt, idx) => {
                        const start = evt?.start_time ? new Date(evt.start_time) : null;
                        const end = evt?.end_time ? new Date(evt.end_time) : null;
                        const minutes = start && end ? Math.max(1, Math.round((end - start) / 60000)) : null;
                        return {
                            id: evt?.uri || `visit-${dateStr}-${idx}`,
                            date: dateStr,
                            time: start ? start.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false }) : '00:00',
                            visitor: evt?.name || 'Scheduled Visit',
                            duration: minutes ? `${minutes} min` : 'N/A',
                            patient: evt?.location?.location || evt?.status || 'Unspecified'
                        };
                    });

                    const updated = [...visitationSchedule.filter(v => v.date !== dateStr), ...visits];
                    setVisitationSchedule(updated);
                    saveToStorage('reception_visitation', updated);
                    showNotification(`Synced ${visits.length} real Calendly event(s).`, 'success', true);
                } catch (error) {
                    showNotification(`Calendly sync failed: ${error.message}`, 'error', true);
                }
            }

            function handleDischargeFileUpload(event) {
                const file = event.target.files?.[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        // Parse the file (JSON or CSV expected)
                        const content = e.target.result;
                        let parsedData = [];
                        
                        if (file.name.endsWith('.json')) {
                            parsedData = JSON.parse(content);
                        } else if (file.name.endsWith('.csv')) {
                            // Basic CSV parsing
                            const lines = content.split('\n');
                            const headers = lines[0].split(',');
                            parsedData = lines.slice(1).map(line => {
                                const values = line.split(',');
                                return headers.reduce((obj, header, idx) => {
                                    obj[header.trim()] = values[idx]?.trim() || '';
                                    return obj;
                                }, {});
                            }).filter(row => Object.values(row).some(v => v));
                        } else {
                            showNotification('Please upload JSON or CSV file', 'error');
                            return;
                        }
                        
                        // Add metadata
                        const withMeta = parsedData.map(record => ({
                            ...record,
                            uploadedAt: Date.now(),
                            status: record.Status?.toLowerCase() || 'pending'
                        }));
                        
                        setDischargeList(withMeta);
                        saveToStorage('reception_discharge_list', withMeta);
                        showNotification(`Loaded ${withMeta.length} discharge records.`, 'success', true);
                    } catch (err) {
                        showNotification(`Error parsing file: ${err.message}`, 'error');
                    }
                };
                reader.readAsText(file);
            }

            function getDischargesByStatus(status = null) {
                if (!status) return dischargeList;
                return dischargeList.filter(d => d.status === status.toLowerCase());
            }

            function updateDischargeStatus(idx, newStatus) {
                const updated = [...dischargeList];
                updated[idx] = { ...updated[idx], status: newStatus, lastUpdated: Date.now(), lastUpdatedBy: currentUser?.displayName };
                setDischargeList(updated);
                saveToStorage('reception_discharge_list', updated);
                showNotification(`Discharge record updated to ${newStatus}.`, 'info', true);
            }

            function exportDischargeList() {
                const csv = [
                    ['Unit', 'Patient', 'Status', 'Last Updated', 'Notes'].join(','),
                    ...dischargeList.map(d => [
                        String(d.Unit || ''),
                        String(d.Patient || ''),
                        String(d.status || ''),
                        d.lastUpdated ? new Date(d.lastUpdated).toLocaleString() : '',
                        String(d.Notes || '')
                    ].map(v => `"${v.replace(/"/g, '""')}"`).join(','))
                ].join('\n');
                
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `discharge_list_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(link);
                link.click();
                setTimeout(() => {
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }, 100);
            }


            function updateReportField(fieldId, value) {
                const nextReport = { ...reportData, [fieldId]: value };
                persistReport(nextReport);
            }

            function applyReportTemplate(templateId) {
                const template = REPORT_TEMPLATES.find(item => item.id === templateId);
                if (!template) return;
                const nextReport = { ...reportData, ...template.content };
                persistReport(nextReport);
                showNotification(`Applied ${template.label} template.`);
            }

            function clonePreviousReport() {
                const reportDates = Object.keys(allReports).sort();
                const previousDate = reportDates.filter(dateKey => dateKey < selectedDate).pop();
                if (!previousDate) {
                    showNotification('No previous report found to copy.', 'error');
                    return;
                }
                const previousReport = allReports[previousDate] || {};
                const cloned = {};
                REPORT_FIELDS.forEach(field => {
                    cloned[field.id] = String(previousReport[field.id] || '');
                });
                persistReport(cloned);
                showNotification(`Copied report content from ${previousDate}.`);
            }

            function openReportHistory() {
                const storedReports = loadFromStorage(STORAGE_KEYS.REPORTS, {});
                setAllReports(storedReports);
                setShowReportHistory(true);
            }

            function exportReportByDate(dateKey) {
                const report = allReports[dateKey] || loadFromStorage(STORAGE_KEYS.REPORTS, {})[dateKey];
                if (!report) {
                    showNotification('Report not found for export.', 'error');
                    return;
                }
                const lines = [
                    `Shift Report - ${dateKey}`,
                    `Priority: ${report.__meta?.priority || 'normal'}`,
                    `Last Saved: ${report.__meta?.savedAt ? new Date(report.__meta.savedAt).toLocaleString() : 'Unknown'}`,
                    `Saved By: ${report.__meta?.savedBy || 'Unknown'}`,
                    ''
                ];
                REPORT_FIELDS.forEach(field => {
                    lines.push(`${field.label}`);
                    lines.push(String(report[field.id] || 'No entry'));
                    lines.push('');
                });
                const blob = new Blob([lines.join('\r\n')], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `shift_report_${dateKey}.txt`;
                document.body.appendChild(link);
                link.click();
                setTimeout(() => {
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }, 100);
            }

            function shiftReportDay(dayOffset) {
                const cursor = new Date(`${selectedDate}T12:00:00`);
                cursor.setDate(cursor.getDate() + dayOffset);
                const nextDate = cursor.toISOString().split('T')[0];
                setSelectedDate(nextDate);
                setCurrentDate(new Date(cursor.getFullYear(), cursor.getMonth(), 1));
            }

            function exportFullBackup() {
                const backup = {};
                for (let index = 0; index < localStorage.length; index++) {
                    const key = localStorage.key(index);
                    if (!key) continue;
                    const include = key.startsWith('reception_')
                        || key.startsWith('baseline_')
                        || key.startsWith('report_priority_')
                        || key.startsWith('report_attachments_')
                        || key === 'shift_templates'
                        || key === 'panic_alerts'
                        || key === 'kudos_wall';
                    if (include) {
                        backup[key] = localStorage.getItem(key);
                    }
                }

                const payload = {
                    version: 1,
                    exportedAt: new Date().toISOString(),
                    app: 'Reception',
                    data: backup
                };
                const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `reception_backup_${new Date().toISOString().slice(0, 10)}.json`;
                document.body.appendChild(link);
                link.click();
                setTimeout(() => {
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }, 100);
                showNotification('Backup exported successfully.');
            }

            function importFullBackup(event) {
                const file = event.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const parsed = JSON.parse(String(reader.result || '{}'));
                        const payload = parsed?.data || {};
                        const keys = Object.keys(payload);
                        if (!keys.length) {
                            showNotification('Backup file had no data.', 'error');
                            return;
                        }
                        if (!confirm(`Import ${keys.length} data entries from backup and reload?`)) {
                            return;
                        }
                        keys.forEach(key => {
                            localStorage.setItem(key, String(payload[key] ?? ''));
                        });
                        showNotification('Backup imported. Reloading...');
                        setTimeout(() => window.location.reload(), 600);
                    } catch (error) {
                        showNotification('Could not import backup file.', 'error');
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            }

            useEffect(() => {
                if (!appSettings.enableKeyboardShortcuts) return;
                function handleKeyDown(event) {
                    if ((event.ctrlKey || event.metaKey) && (event.key === 'k' || event.key === 'K')) {
                        event.preventDefault();
                        setIsCommandPaletteOpen(open => !open);
                        return;
                    }
                    if (event.key === 'Escape' && isCommandPaletteOpen) {
                        setIsCommandPaletteOpen(false);
                        return;
                    }
                    const tagName = String(event.target?.tagName || '').toLowerCase();
                    const isTypingTarget = tagName === 'input' || tagName === 'textarea' || tagName === 'select' || event.target?.isContentEditable;
                    if (isTypingTarget) return;
                    if (event.altKey && event.key === 'ArrowLeft') {
                        event.preventDefault();
                        shiftReportDay(-1);
                    }
                    if (event.altKey && event.key === 'ArrowRight') {
                        event.preventDefault();
                        shiftReportDay(1);
                    }
                    if (event.altKey && (event.key === 's' || event.key === 'S')) {
                        event.preventDefault();
                        setIsSettingsOpen(true);
                    }
                }
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [appSettings.enableKeyboardShortcuts, selectedDate, isCommandPaletteOpen]);

            function getStaffColor(staffId) {
                const member = staff[staffId] || {};
                if (member.color) return member.color;
                const legacyBg = String(member.bg || '').toLowerCase();
                if (legacyBg.includes('cyan')) return '#06b6d4';
                if (legacyBg.includes('rose')) return '#f43f5e';
                if (legacyBg.includes('fuchsia')) return '#d946ef';
                if (legacyBg.includes('blue')) return '#3b82f6';
                return '#94a3b8';
            }

            // --- FIRESTORE SYNC HOOKS (OPTIONAL) ---
            // Load shared shifts and staff from Firestore on mount (only if Firebase available)
            useEffect(() => {
                async function fetchSharedData() {
                    if (!isFirebaseAvailable) {
                        console.log('Skipping Firestore sync - Firebase not available');
                        return;
                    }
                    const loadedShifts = await loadFromFirestore('shared', 'shifts', null);
                    const loadedStaff = await loadFromFirestore('shared', 'staff', null);
                    // Only update state if we got valid data from Firestore
                    if (loadedShifts && typeof loadedShifts === 'object' && Object.keys(loadedShifts).length > 0) {
                        setEvents(loadedShifts);
                    }
                    if (loadedStaff && typeof loadedStaff === 'object' && Object.keys(loadedStaff).length > 0) {
                        setStaff(loadedStaff);
                    }
                }
                fetchSharedData();
            }, []);

            // Save shifts to Firestore when events change (only if Firebase available)
            useEffect(() => {
                if (isFirebaseAvailable && Object.keys(events).length > 0) {
                    saveToFirestore('shared', 'shifts', events);
                }
            }, [events]);

            // Save staff to Firestore when staff changes (only if Firebase available)
            useEffect(() => {
                if (isFirebaseAvailable && Object.keys(staff).length > 0) {
                    saveToFirestore('shared', 'staff', staff);
                }
            }, [staff]);

            // --- Admin Master Reset Pattern ---
            // --- Baseline Save/Restore ---
            function saveBaseline() {
                if (!requireAdmin()) return;
                // Save current staff and shifts as baseline for the current month
                const mIdx = currentDate.getMonth(), yIdx = currentDate.getFullYear();
                const key = `baseline_${yIdx}_${String(mIdx+1).padStart(2,'0')}`;
                const baseline = {
                    staff,
                    shifts: events
                };
                saveToStorage(key, baseline);
                alert('Baseline for this month saved!');
            }

            function restoreBaseline() {
                if (!requireAdmin()) return;
                const mIdx = currentDate.getMonth(), yIdx = currentDate.getFullYear();
                const key = `baseline_${yIdx}_${String(mIdx+1).padStart(2,'0')}`;
                const baseline = loadFromStorage(key);
                if (!baseline) {
                    alert('No baseline saved for this month.');
                    return;
                }
                setStaff(baseline.staff);
                setEvents(baseline.shifts);
                saveToStorage(STORAGE_KEYS.STAFF, baseline.staff);
                saveToStorage(STORAGE_KEYS.SHIFTS, baseline.shifts);
                alert('Baseline restored for this month!');
            }

            function handleMasterReset() {
                if (!requireAdmin()) return;
                const year = new Date().getFullYear();
                if (!confirm(`ADMIN MASTER RESET: Clear all saved data for ${year} and keep only core app settings/accounts?`)) return;
                clearAllStorage();
                ensureCoreDataInitialized();
                loadDataFromStorage();
                alert('Master reset complete!');
            }

            function toMinutes(timeText) {
                const [h, m] = String(timeText || '00:00').split(':').map(Number);
                return (h * 60) + (m || 0);
            }

            function hasShiftConflict(sourceEvents, empId, dateKey, start, end, excludeShiftId = null) {
                const startMinutes = toMinutes(start);
                const endMinutes = toMinutes(end);
                const sameDay = sourceEvents[dateKey] || [];
                return sameDay.some(shift => {
                    if (shift.id === excludeShiftId) return false;
                    if (shift.empId !== empId) return false;
                    const shiftStart = shift.start || shift.time || '08:00';
                    const shiftEnd = shift.end || '20:00';
                    const shiftStartMinutes = toMinutes(shiftStart);
                    const shiftEndMinutes = toMinutes(shiftEnd);
                    return startMinutes < shiftEndMinutes && shiftStartMinutes < endMinutes;
                });
            }

            function createShiftForDate(empId, dateKey, start = '08:00', end = '20:00', options = {}) {
                const { silent = false } = options;
                const updatedEvents = { ...events };
                if (hasShiftConflict(updatedEvents, empId, dateKey, start, end)) {
                    if (!silent) {
                        showNotification(`${staff[empId]?.name || 'Staff'} already has an overlapping shift on ${dateKey}.`, 'error');
                    }
                    return false;
                }
                if (!updatedEvents[dateKey]) updatedEvents[dateKey] = [];
                const newShift = {
                    id: `shift-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
                    date: dateKey,
                    empId,
                    start,
                    end,
                    confirmed: true,
                    createdAt: Date.now()
                };
                updatedEvents[dateKey] = [...updatedEvents[dateKey], newShift];
                setEvents(updatedEvents);
                saveToStorage(STORAGE_KEYS.SHIFTS, updatedEvents);
                return true;
            }

            function toggleBulkWeekday(dayIndex) {
                setBulkAssign(previous => {
                    const exists = previous.weekdays.includes(dayIndex);
                    const weekdays = exists
                        ? previous.weekdays.filter(day => day !== dayIndex)
                        : [...previous.weekdays, dayIndex].sort((a, b) => a - b);
                    return { ...previous, weekdays };
                });
            }

            function applyBulkAssignments() {
                if (!bulkAssign.empId) {
                    showNotification('Select a staff member for bulk scheduling.', 'error');
                    return;
                }
                if (!bulkAssign.weekdays.length) {
                    showNotification('Select at least one weekday.', 'error');
                    return;
                }
                if (bulkAssign.rangeEnd < bulkAssign.rangeStart) {
                    showNotification('Bulk range end date must be after start date.', 'error');
                    return;
                }

                const updatedEvents = { ...events };
                let created = 0;
                let skipped = 0;

                const cursor = new Date(`${bulkAssign.rangeStart}T00:00:00`);
                const endDate = new Date(`${bulkAssign.rangeEnd}T00:00:00`);
                while (cursor <= endDate) {
                    const weekday = cursor.getDay();
                    if (bulkAssign.weekdays.includes(weekday)) {
                        const dateKey = cursor.toISOString().split('T')[0];
                        if (!hasShiftConflict(updatedEvents, bulkAssign.empId, dateKey, bulkAssign.start, bulkAssign.end)) {
                            if (!updatedEvents[dateKey]) updatedEvents[dateKey] = [];
                            updatedEvents[dateKey] = [
                                ...updatedEvents[dateKey],
                                {
                                    id: `shift-${Date.now()}-${Math.random().toString(36).slice(2, 8)}-${created}`,
                                    date: dateKey,
                                    empId: bulkAssign.empId,
                                    start: bulkAssign.start,
                                    end: bulkAssign.end,
                                    confirmed: true,
                                    createdAt: Date.now()
                                }
                            ];
                            created += 1;
                        } else {
                            skipped += 1;
                        }
                    }
                    cursor.setDate(cursor.getDate() + 1);
                }

                setEvents(updatedEvents);
                saveToStorage(STORAGE_KEYS.SHIFTS, updatedEvents);
                setIsBulkAssignOpen(false);
                showNotification(`Bulk scheduling complete: ${created} added, ${skipped} skipped.`);
            }

            function handleStaffDragStart(event, staffId) {
                if (event?.dataTransfer) {
                    event.dataTransfer.effectAllowed = 'move';
                    event.dataTransfer.setData('text/plain', `staff:${staffId}`);
                }
                setDraggedStaff(staffId);
                setDraggedShift(null);
            }

            function handleShiftDragStart(event, shift, fromDate) {
                if (event?.dataTransfer) {
                    event.dataTransfer.effectAllowed = 'move';
                    event.dataTransfer.setData('text/plain', `shift:${fromDate}:${shift.id}`);
                }
                setDraggedShift({ shift, fromDate });
                setDraggedStaff(null);
            }

            function handleCalendarDragOver(event, dateKey) {
                event.preventDefault();
                if (event?.dataTransfer) {
                    event.dataTransfer.dropEffect = 'move';
                }
                if (dragOverDate !== dateKey) {
                    setDragOverDate(dateKey);
                }
            }

            function handleCalendarDrop(event, dateKey) {
                event.preventDefault();

                let staffToDrop = draggedStaff;
                let shiftToDrop = draggedShift;
                const payload = event?.dataTransfer?.getData('text/plain') || '';
                if (!staffToDrop && !shiftToDrop && payload.startsWith('staff:')) {
                    staffToDrop = payload.slice(6);
                }
                if (!shiftToDrop && payload.startsWith('shift:')) {
                    const [, fromDate, shiftId] = payload.split(':');
                    const foundShift = (events[fromDate] || []).find(item => item.id === shiftId);
                    if (foundShift) {
                        shiftToDrop = { shift: foundShift, fromDate };
                    }
                }

                if (staffToDrop) {
                    const created = createShiftForDate(staffToDrop, dateKey, appSettings.defaultShiftStart || '08:00', appSettings.defaultShiftEnd || '20:00');
                    if (created) {
                        showNotification(`Scheduled ${staff[staffToDrop]?.name || 'staff'} on ${dateKey}.`);
                    }
                }

                if (shiftToDrop) {
                    const { shift, fromDate } = shiftToDrop;
                    if (fromDate !== dateKey) {
                        const updatedEvents = { ...events };
                        const movingStart = shift.start || shift.time || '08:00';
                        const movingEnd = shift.end || '20:00';
                        if (hasShiftConflict(updatedEvents, shift.empId, dateKey, movingStart, movingEnd, shift.id)) {
                            showNotification(`${staff[shift.empId]?.name || 'Staff'} already has an overlapping shift on ${dateKey}.`, 'error');
                            setDraggedStaff(null);
                            setDraggedShift(null);
                            setDragOverDate(null);
                            return;
                        }
                        const fromList = [...(updatedEvents[fromDate] || [])].filter(item => item.id !== shift.id);
                        if (fromList.length > 0) {
                            updatedEvents[fromDate] = fromList;
                        } else {
                            delete updatedEvents[fromDate];
                        }
                        if (!updatedEvents[dateKey]) updatedEvents[dateKey] = [];
                        updatedEvents[dateKey] = [...updatedEvents[dateKey], { ...shift, date: dateKey }];
                        setEvents(updatedEvents);
                        saveToStorage(STORAGE_KEYS.SHIFTS, updatedEvents);
                        showNotification(`Moved ${staff[shift.empId]?.name || 'shift'} to ${dateKey}.`);
                    }
                }

                setDraggedStaff(null);
                setDraggedShift(null);
                setDragOverDate(null);
            }

            function handleCalendarDragLeave(dateKey) {
                if (dragOverDate === dateKey) {
                    setDragOverDate(null);
                }
            }

            // --- UI Elements ---
            const [shiftStatusFilter, setShiftStatusFilter] = useState('all');
            const [shiftSearch, setShiftSearch] = useState('');
            const calendarMatrix = useMemo(() => {
                const mIdx = currentDate.getMonth(), yIdx = currentDate.getFullYear();
                const total = new Date(yIdx, mIdx + 1, 0).getDate();
                const weekOffset = appSettings.weekStartsOnMonday ? 1 : 0;
                const start = (new Date(yIdx, mIdx, 1).getDay() - weekOffset + 7) % 7;
                const minCellHeight = appSettings.compactCalendar ? '140px' : '180px';
                const cells = [];
                for (let i = 0; i < start; i++) cells.push(<div key={`e-${i}`} style={{minHeight: minCellHeight}} className="bg-white/[0.01] border border-white/[0.03]" />);
                for (let d = 1; d <= total; d++) {
                    const dk = `${yIdx}-${String(mIdx + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    let dayShifts = events[dk] || [];
                    if (shiftStatusFilter === 'confirmed') dayShifts = dayShifts.filter(s => s.confirmed);
                    if (shiftStatusFilter === 'pending') dayShifts = dayShifts.filter(s => !s.confirmed);
                    if (shiftSearch.trim()) {
                        const search = shiftSearch.trim().toLowerCase();
                        dayShifts = dayShifts.filter(s => {
                            const emp = staff[s.empId]?.name?.toLowerCase() || '';
                            return emp.includes(search) || dk.includes(search);
                        });
                    }
                    const isToday = new Date().toISOString().split('T')[0] === dk;
                    cells.push(
                        <div key={dk} onClick={() => setSelectedDate(dk)} onDragOver={(event) => handleCalendarDragOver(event, dk)} onDrop={(event) => handleCalendarDrop(event, dk)} onDragLeave={() => handleCalendarDragLeave(dk)} style={{background: selectedDate === dk ? 'linear-gradient(135deg, var(--accent-soft), rgba(255,255,255,0.02))' : 'linear-gradient(135deg, var(--panel-start), var(--panel-end))', border: dragOverDate === dk ? '2px solid var(--highlight)' : (selectedDate === dk ? '2px solid var(--accent)' : '1px solid var(--accent-soft)'), boxShadow: dragOverDate === dk ? '0 0 24px var(--highlight-glow), inset 0 2px 0 rgba(255,255,255,0.08)' : (selectedDate === dk ? '0 0 20px var(--accent-glow), inset 0 2px 0 rgba(255,255,255,0.1)' : 'inset 0 1px 0 rgba(255,255,255,0.05), inset 0 -1px 0 rgba(0,0,0,0.5)'), minHeight: minCellHeight}} className={`p-3 transition-all cursor-pointer relative group ${isToday ? 'border-l-4' : ''}`}>
                            {isToday && <div className="rivet" style={{top: '4px', left: '4px'}} />}
                            <div className="flex justify-between items-start">
                                <span style={{color: selectedDate === dk ? 'var(--accent)' : 'var(--text-muted)', fontWeight: 900, fontSize: '1.5rem', textShadow: selectedDate === dk ? '0 0 10px var(--accent-glow)' : 'none'}}>{d}</span>
                                <button onClick={(e) => { e.stopPropagation(); setSelectedDate(dk); if (e.shiftKey) { quickAddShift(dk); } else { setIsAddModalOpen(true); } }} style={{background: 'linear-gradient(145deg, var(--accent), var(--accent-dark))', border: '1px solid var(--accent)', padding: '4px 8px', color: '#1a1a1b', fontWeight: 900}} className="opacity-40 hover:opacity-100 transition-opacity" title="Click to open shift wizard. Shift+Click for quick-add default shift."><IconPlus /></button>
                            </div>
                            <div className="space-y-2 mt-4">
                                {dayShifts.length === 0 ? <div style={{color: 'var(--accent)', fontSize: '9px', fontWeight: 900, letterSpacing: '0.1em', textTransform: 'uppercase'}} className="animate-pulse flex items-center gap-1 mt-2"><IconAlert /> NEEDS COVERAGE</div> : 
                                    dayShifts.map(s => (
                                        <div key={s.id} draggable onDragStart={(event) => { event.stopPropagation(); handleShiftDragStart(event, s, dk); }} onDragEnd={() => { setDraggedShift(null); setDragOverDate(null); }} onClick={(e) => { e.stopPropagation(); setEditingShift(s); }} 
                                            style={{background: 'linear-gradient(145deg, var(--accent), var(--accent-dark))', border: '2px solid var(--accent-dark)', borderRadius: '4px', padding: '8px 12px', color: 'var(--text-primary)', fontWeight: 900, fontSize: '12px', letterSpacing: '0.05em', textTransform: 'uppercase', boxShadow: '0 3px 0 rgba(0,0,0,0.35), 0 6px 15px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.2)', position: 'relative'}} className="cursor-pointer transition-all hover:translate-y-[-2px]">
                                            <div className="rivet" style={{top: '3px', left: '3px', width: '6px', height: '6px'}} />
                                            <div className="rivet" style={{top: '3px', right: '3px', width: '6px', height: '6px'}} />
                                            <div className="flex items-center justify-between">
                                                <span className="flex items-center gap-2">
                                                    {appSettings.showStaffColorMarkers && <span style={{width: '10px', height: '10px', borderRadius: '999px', background: getStaffColor(s.empId), boxShadow: '0 0 8px rgba(255,255,255,0.35), inset 0 0 0 1px rgba(0,0,0,0.35)'}} />}
                                                    <span style={{color: appSettings.showStaffColorMarkers ? getStaffColor(s.empId) : 'var(--text-primary)'}}>{staff[s.empId]?.name || '...'}</span>
                                                </span>
                                                <span style={{opacity: 0.6, fontSize: '10px'}}>{(s.start || s.time) + (s.end ? ` - ${s.end}` : '')}</span>
                                            </div>
                                        </div>
                                    ))
                                }
                            </div>
                        </div>
                    );
                }
                return cells;
            }, [currentDate, events, selectedDate, staff, shiftStatusFilter, shiftSearch, dragOverDate, appSettings.weekStartsOnMonday, appSettings.compactCalendar, appSettings.defaultShiftStart, appSettings.defaultShiftEnd]);

            const reportCompletion = getReportCompletion(reportData);
            const reportLastSavedAt = reportData?.__meta?.savedAt || null;

            return (
                <div className="app-shell flex h-screen w-screen bg-black overflow-hidden text-xs">

                                                    <div className="flex gap-2 items-center">
                                                        <div style={{padding: '8px 14px', borderRadius: '6px', fontSize: '10px', fontWeight: 'bold', textTransform: 'uppercase', background: prnStaff.status === 'available' ? '#10b981'/20 : prnStaff.status === 'unavailable' ? '#ef4444'/20 : '#94a3b8'/20, color: prnStaff.status === 'available' ? '#10b981' : prnStaff.status === 'unavailable' ? '#ef4444' : '#94a3b8'}}>
                                                            {prnStaff.status}
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => updatePrnAvailability(prnStaff.id, 'available')} className="fancy-btn flex-1" style={{padding: '8px 12px', fontSize: '10px', background: prnStaff.status === 'available' ? '#10b981' : '#64748b'}}>
                                                        ✅ AVAILABLE
                                                    </button>
                                                    <button onClick={() => updatePrnAvailability(prnStaff.id, 'unavailable')} className="fancy-btn flex-1" style={{padding: '8px 12px', fontSize: '10px', background: prnStaff.status === 'unavailable' ? '#ef4444' : '#64748b'}}>
                                                        ❌ UNAVAILABLE
                                                    </button>
                                                    <button onClick={() => recordStaffShiftCompletion(prnStaff.id)} className="fancy-btn" style={{padding: '8px 12px', fontSize: '10px', background: '#3b82f6'}}>
                                                        WORKED
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* NOTIFICATION CENTER MODAL */}
                    {isNotificationCenterOpen && (
                        <div className="fixed inset-0 bg-black/85 z-[1900] flex items-center justify-center p-4" onClick={() => setIsNotificationCenterOpen(false)}>
                            <div className="glass-panel neon-blue p-6 w-full max-w-2xl max-h-[80vh] overflow-y-auto rounded-3xl text-left" onClick={e => e.stopPropagation()}>
                                <div className="flex items-start justify-between gap-4 mb-5">
                                    <div>
                                        <div className="text-[10px] uppercase tracking-[0.3em]" style={{color: 'var(--accent)'}}>📢 Notification Center</div>
                                        <h3 className="text-2xl font-black mt-2">Recent Alerts</h3>
                                    </div>
                                    <button type="button" onClick={() => setIsNotificationCenterOpen(false)} className="text-4xl leading-none">&times;</button>
                                </div>
                                
                                {notifications.length === 0 && (
                                    <div className="text-center py-8 text-slate-400">No notifications yet. All clear!</div>
                                )}
                                
                                <div className="space-y-3">
                                    {notifications.map(notif => (
                                        <div key={notif.id} className={`rounded-lg p-4 border ${notif.type === 'error' ? 'border-red-500/30 bg-red-500/5' : notif.type === 'success' ? 'border-green-500/30 bg-green-500/5' : notif.type === 'warning' ? 'border-yellow-500/30 bg-yellow-500/5' : 'border-blue-500/30 bg-blue-500/5'}`}>
                                            <div className="flex items-start justify-between gap-3">
                                                <div className="flex-1">
                                                    <div style={{color: notif.type === 'error' ? '#ef4444' : notif.type === 'success' ? '#10b981' : notif.type === 'warning' ? '#f59e0b' : '#3b82f6', fontWeight: 'bold', textTransform: 'uppercase', fontSize: '10px', marginBottom: '4px'}}>
                                                        {notif.type === 'error' ? '❌' : notif.type === 'success' ? '✅' : notif.type === 'warning' ? '⚠️' : 'ℹ️'} {notif.type}
                                                    </div>
                                                    <div className="text-sm mb-2">{notif.msg}</div>
                                                    <div style={{color: 'var(--text-muted)', fontSize: '10px'}}>{notif.timestamp} {!notif.read && '(unread)'}</div>
                                                </div>
                                                <div className="flex gap-2 shrink-0">
                                                    {!notif.read && <button onClick={() => markNotificationRead(notif.id)} className="fancy-btn" style={{padding: '6px 10px', fontSize: '9px'}}>MARK READ</button>}
                                                    <button onClick={() => dismissNotification(notif.id)} className="fancy-btn" style={{padding: '6px 10px', fontSize: '9px', background: 'rgba(255,255,255,0.1)'}}>DISMISS</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* REPORT HISTORY MODAL */}
                    {showReportHistory && (
                        <div className="fixed inset-0 bg-black/85 z-[1800] flex items-center justify-center p-4" onClick={() => setShowReportHistory(false)}>
                            <div className="glass-panel neon-blue p-6 w-full max-w-3xl max-h-[86vh] overflow-y-auto rounded-3xl text-left" onClick={e => e.stopPropagation()}>
                                <div className="flex items-start justify-between gap-4 mb-5">
                                    <div>
                                        <div className="text-[10px] uppercase tracking-[0.3em]" style={{color: 'var(--accent)'}}>Shift Reports Archive</div>
                                        <h3 className="text-2xl font-black mt-2">Previous Reports</h3>
                                    </div>
                                    <button type="button" onClick={() => setShowReportHistory(false)} className="text-4xl leading-none">&times;</button>
                                </div>
                                <input
                                    value={reportSearchTerm}
                                    onChange={e => setReportSearchTerm(e.target.value)}
                                    className="panel-input"
                                    placeholder="Search report dates or content"
                                />
                                <div className="mt-4 space-y-3">
                                    {Object.keys(allReports)
                                        .sort((a, b) => a < b ? 1 : -1)
                                        .filter(dateKey => {
                                            const report = allReports[dateKey] || {};
                                            const search = reportSearchTerm.trim().toLowerCase();
                                            if (!search) return true;
                                            const content = REPORT_FIELDS.map(field => String(report[field.id] || '')).join(' ').toLowerCase();
                                            return dateKey.includes(search) || content.includes(search);
                                        })
                                        .map(dateKey => {
                                            const report = allReports[dateKey] || {};
                                            const completion = getReportCompletion(report);
                                            const previewField = REPORT_FIELDS.find(field => String(report[field.id] || '').trim());
                                            const preview = previewField ? String(report[previewField.id]).slice(0, 110) : 'No notes entered yet.';
                                            return (
                                                <div key={dateKey} className="rounded-2xl border border-white/10 p-4 bg-white/[0.02]">
                                                    <div className="flex flex-wrap gap-3 justify-between items-start">
                                                        <div>
                                                            <div className="font-black text-sm uppercase tracking-[0.14em]">{dateKey}</div>
                                                            <div className="text-[11px] mt-1" style={{color: 'var(--text-muted)'}}>
                                                                {completion.completed}/{completion.total} fields, priority: {report.__meta?.priority || 'normal'}
                                                            </div>
                                                            <div className="text-[11px] mt-2" style={{color: 'var(--text-muted)'}}>
                                                                {previewField ? `${previewField.label}: ${preview}` : preview}
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button
                                                                type="button"
                                                                className="fancy-btn"
                                                                style={{padding: '8px 12px', fontSize: '10px'}}
                                                                onClick={() => {
                                                                    setSelectedDate(dateKey);
                                                                    setShowReportHistory(false);
                                                                    showNotification(`Loaded report for ${dateKey}.`);
                                                                }}
                                                            >
                                                                OPEN
                                                            </button>
                                                            <button
                                                                type="button"
                                                                className="fancy-btn"
                                                                style={{padding: '8px 12px', fontSize: '10px'}}
                                                                onClick={() => exportReportByDate(dateKey)}
                                                            >
                                                                EXPORT
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* AUTH MODAL */}
                    {isAuthModalOpen && (
                        <div className="fixed inset-0 bg-black/95 backdrop-blur-xl z-[2500] flex items-center justify-center p-4">
                            <div className="glass-panel neon-fuchsia w-full max-w-md p-8 rounded-[2rem] text-left text-white">
                                <div className="text-[10px] uppercase tracking-[0.3em] mb-3" style={{color: 'var(--accent)'}}>Secure Access</div>
                                <h2 className="text-3xl font-black uppercase tracking-tight">Sign In</h2>
                                <div className="text-sm text-white/65 mt-3">Use an admin account to manage staff, settings, and access rules. Staff accounts still have scheduling and reporting access.</div>
                                <form onSubmit={handleLoginSubmit} className="space-y-4 mt-6">
                                    <input value={loginUsername} onChange={e => setLoginUsername(e.target.value)} className="panel-input" placeholder="Username" autoFocus />
                                    <input type="password" value={loginPassword} onChange={e => setLoginPassword(e.target.value)} className="panel-input" placeholder="Password" />
                                    {loginError && <div className="text-sm text-rose-300">{loginError}</div>}
                                    <button type="submit" className="fancy-btn w-full" style={{padding: '12px 18px', fontSize: '11px'}}>ENTER PLATFORM</button>
                                    <button type="button" onClick={handleQuickStaffAccess} className="w-full" style={{padding: '10px 16px', fontSize: '11px', borderRadius: '10px', border: '1px solid rgba(255,255,255,0.2)', color: 'var(--text-primary)', background: 'rgba(255,255,255,0.03)'}}>QUICK STAFF ACCESS</button>
                                </form>
                                <div className="mt-6 rounded-2xl border border-white/10 p-4 bg-white/[0.02] text-[11px] text-white/68 leading-relaxed">
                                    Credentials are intentionally hidden. Contact your administrator for account access.
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Register Service Worker for offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Use relative path to work with GitHub Pages subdirectory deployment
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('✅ Service Worker registered successfully:', registration);
                        console.log('📱 App is now installable as a PWA');
                    })
                    .catch(err => {
                        console.warn('⚠️ Service Worker registration failed (PWA features unavailable):', err);
                        // App still works without service worker, just no offline caching
                    });
            });
        }
    </script>
</body>
</html>
