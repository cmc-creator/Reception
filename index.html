        /* ═══════════════════════════════════════════════════════
           INDUSTRIAL STEAMPUNK COMMAND TERMINAL
           ═══════════════════════════════════════════════════════ */
        :root {
            --charcoal: #1a1a1b;
            --copper: #b87333;
            --copper-dark: #8b5a2b;
            --cyan: #00f3ff;
            --copper-glow: rgba(184, 115, 51, 0.6);
            --cyan-glow: rgba(0, 243, 255, 0.8);
            --rivet-color: #5a4a3a;
            --panel-edge: #2a2a2b;
        }
        
        * {
            font-family: 'JetBrains Mono', 'Courier New', monospace !important;
        }
        
        body {
            background: radial-gradient(ellipse at top, #2a1a1a 0%, #1a1a1b 50%, #0a0a0b 100%) !important;
            color: #e0e0e0 !important;
            overflow: hidden;
        }
        
        /* ═══ RIVETS & INDUSTRIAL DECORATIONS ═══ */
        .rivet {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #6a5a4a, var(--rivet-color) 60%, #3a2a1a);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.2);
        }
        
        /* ═══ INDUSTRIAL METAL PANELS ═══ */
        .glass-panel {
            background: linear-gradient(135deg, rgba(26, 26, 27, 0.98) 0%, rgba(35, 30, 28, 0.95) 100%);
            border: 2px solid var(--copper);
            border-radius: 4px;
            position: relative;
            box-shadow: 
                0 0 20px var(--copper-glow),
                inset 0 2px 0 rgba(255, 255, 255, 0.1),
                inset 0 -2px 5px rgba(0, 0, 0, 0.6);
        }
        
        .glass-panel::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid rgba(184, 115, 51, 0.3);
            pointer-events: none;
        }
        
        .neon-blue {
            border: 2px solid var(--cyan);
            box-shadow: 0 0 28px var(--cyan-glow), 0 6px 24px rgba(0,0,0,0.6);
        }
        
        .neon-fuchsia {
            border: 2px solid var(--copper);
            box-shadow: 0 0 20px var(--copper-glow), 0 6px 24px rgba(0,0,0,0.6);
        }
        
        .holo-text {
            text-shadow: 0 0 12px var(--cyan), 0 0 3px var(--copper);
        }
        
        /* ═══ MECHANICAL LEVER SWITCHES (BUTTONS) ═══ */
        .fancy-btn {
            background: linear-gradient(145deg, rgba(184, 115, 51, 0.9), rgba(139, 90, 43, 0.95));
            color: #1a1a1b;
            border: 2px solid var(--copper);
            border-radius: 6px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            position: relative;
            box-shadow: 
                0 4px 0 var(--copper-dark),
                0 8px 20px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.1s;
        }
        
        .fancy-btn::before {
            content: '';
            position: absolute;
            inset: -4px;
            border: 2px solid var(--cyan);
            border-radius: 8px;
            opacity: 0;
            animation: borderGlow 2s ease-in-out infinite;
        }
        
        @keyframes borderGlow {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.6; box-shadow: 0 0 20px var(--cyan-glow); }
        }
        
        .fancy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 6px 0 var(--copper-dark),
                0 12px 30px var(--copper-glow);
        }
        
        .fancy-btn:active {
            transform: translateY(2px);
            box-shadow: 
                0 2px 0 var(--copper-dark),
                0 4px 10px rgba(0, 0, 0, 0.8);
        }
        
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes shrink {
            from { width: 100%; }
            to { width: 0%; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .animate-pulse {
            animation: pulse 2.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @media (max-width: 900px) {
            .flex, .flex-1, .flex-col, .flex-row, .p-8, .p-10, .w-80, .max-w-2xl, .max-w-md {

        @media print {

        // --- FIRESTORE DATA LAYER (SHARED) ---
        async function saveToFirestore(collection, doc, data) {
            if (!isFirebaseAvailable || !db) return;
            try {
                await db.collection(collection).doc(doc).set(data);
            } catch (error) {
                console.warn('Failed to save to Firestore:', error);
            }
        }
        async function loadFromFirestore(collection, doc, defaultValue = null) {
            if (!isFirebaseAvailable || !db) return defaultValue;
            try {
                const snap = await db.collection(collection).doc(doc).get();
                return snap.exists ? snap.data() : defaultValue;
            } catch (error) {
                console.warn('Failed to load from Firestore:', error);
                return defaultValue;
            }
        }

        // --- LOCALSTORAGE DATA LAYER ---
        const STORAGE_KEYS = {
            SHIFTS: 'reception_shifts',

            MESSAGES: 'reception_messages',
            REPORTS: 'reception_reports',
            ALERT: 'reception_alert',
            INITIALIZED: 'reception_initialized'
        };

        function saveToStorage(key, data) {
            try {
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) {
                console.error('Failed to save to localStorage:', e);
            }
        }

        function loadFromStorage(key, defaultValue = null) {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : defaultValue;
            } catch (e) {
                console.error('Failed to load from localStorage:', e);
                return defaultValue;
            }
        }

        function clearAllStorage() {
            Object.values(STORAGE_KEYS).forEach(key => localStorage.removeItem(key));

        function initializeSeedData() {
            // Seed staff
            const seedStaff = {
                'unit-karen': { id: 'unit-karen', name: 'Karen', bg: 'bg-cyan-600/80', color: '#0891b2' },

            const month = 1; // February (0-based)

                const date = new Date(year, month, d);
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

                // Check if app has been initialized before
                const initialized = loadFromStorage(STORAGE_KEYS.INITIALIZED);
                
                if (!initialized) {
                    // First load - initialize with seed data
                    initializeSeedData();
                }

                // Load data from localStorage
                loadDataFromStorage();
            }, []);

            function loadDataFromStorage() {
                const loadedShifts = loadFromStorage(STORAGE_KEYS.SHIFTS, {});
                const loadedStaff = loadFromStorage(STORAGE_KEYS.STAFF, {});
                const loadedMessages = loadFromStorage(STORAGE_KEYS.MESSAGES, []);
                const loadedAlert = loadFromStorage(STORAGE_KEYS.ALERT, '');
                
                setEvents(loadedShifts);
                setStaff(loadedStaff);
                setMessages(loadedMessages);
                setGlobalAlert(loadedAlert);
            }

            // --- Load report data and checklist when selected date changes ---
            useEffect(() => {
                const allReports = loadFromStorage(STORAGE_KEYS.REPORTS, {});
                setReportData(allReports[selectedDate] || {});
                setChecklist(loadFromStorage('reception_checklist_' + selectedDate, []));
            }, [selectedDate]);

            // --- FIRESTORE SYNC HOOKS (OPTIONAL) ---
            // Load shared shifts and staff from Firestore on mount (only if Firebase available)
            useEffect(() => {
                async function fetchSharedData() {
                    if (!isFirebaseAvailable) {
                        console.log('Skipping Firestore sync - Firebase not available');
                        return;
                    }
                    const loadedShifts = await loadFromFirestore('shared', 'shifts', null);
                    const loadedStaff = await loadFromFirestore('shared', 'staff', null);
                    // Only update state if we got valid data from Firestore
                    if (loadedShifts && typeof loadedShifts === 'object' && Object.keys(loadedShifts).length > 0) {
                        setEvents(loadedShifts);
                    }
                    if (loadedStaff && typeof loadedStaff === 'object' && Object.keys(loadedStaff).length > 0) {
                        setStaff(loadedStaff);
                    }
                }
                fetchSharedData();
            }, []);

            // Save shifts to Firestore when events change (only if Firebase available)
            useEffect(() => {
                if (isFirebaseAvailable && Object.keys(events).length > 0) {
                    saveToFirestore('shared', 'shifts', events);
                }
            }, [events]);

            // Save staff to Firestore when staff changes (only if Firebase available)
            useEffect(() => {
                if (isFirebaseAvailable && Object.keys(staff).length > 0) {
                    saveToFirestore('shared', 'staff', staff);
                }
            }, [staff]);

            // --- Admin Master Reset Pattern ---
            // --- Baseline Save/Restore ---
            function saveBaseline() {
                // Save current staff and shifts as baseline for the current month
                const mIdx = currentDate.getMonth(), yIdx = currentDate.getFullYear();
                const key = `baseline_${yIdx}_${String(mIdx+1).padStart(2,'0')}`;
                const baseline = {
                    staff,
                    shifts: events
                };
                saveToStorage(key, baseline);
                alert('Baseline for this month saved!');
            }

            function restoreBaseline() {
                const mIdx = currentDate.getMonth(), yIdx = currentDate.getFullYear();
                const key = `baseline_${yIdx}_${String(mIdx+1).padStart(2,'0')}`;
                const baseline = loadFromStorage(key);
                if (!baseline) {
                    alert('No baseline saved for this month.');
                    return;
                }
                setStaff(baseline.staff);
                setEvents(baseline.shifts);
                saveToStorage(STORAGE_KEYS.STAFF, baseline.staff);
                saveToStorage(STORAGE_KEYS.SHIFTS, baseline.shifts);
                alert('Baseline restored for this month!');
            }

            function handleMasterReset() {
                const year = new Date().getFullYear();
                if (!confirm(`ADMIN MASTER RESET: Restore personnel Karen, Izzy, Annalissia, and Hal and force February ${year} Baseline schedule?`)) return;
                // Clear all data and re-initialize
                clearAllStorage();
                initializeSeedData();
                loadDataFromStorage();
                alert('Master reset complete!');
            }

            // --- Scheduling Helper Functions ---
            function computeShiftHours(shift) {
                const start = shift.start || shift.time || '00:00';
                const end = shift.end || '';
                if (!end) return 0;
                const [sh, sm] = start.split(':').map(Number);
                const [eh, em] = end.split(':').map(Number);
                const mins = (eh * 60 + em) - (sh * 60 + sm);
                return mins > 0 ? mins / 60 : (mins + 24 * 60) / 60;
            }

            function getEmployeeMonthHours(empId) {
                const mIdx = currentDate.getMonth(), yIdx = currentDate.getFullYear();
                const prefix = `${yIdx}-${String(mIdx + 1).padStart(2, '0')}`;
                let total = 0;
                Object.entries(events).forEach(([date, shifts]) => {
                    if (!date.startsWith(prefix)) return;
                    shifts.forEach(s => { if (s.empId === empId) total += computeShiftHours(s); });
                });
                return total;
            }

            function getWeekDates(dateStr) {
                const d = new Date(dateStr + 'T00:00:00');
                const day = d.getDay(); // 0=Sun
                const sunday = new Date(d);
                sunday.setDate(d.getDate() - day);
                return Array.from({ length: 7 }, (_, i) => {
                    const dt = new Date(sunday);
                    dt.setDate(sunday.getDate() + i);
                    return dt.toISOString().split('T')[0];
                });
            }

            function copyWeekToNext() {
                const weekDates = getWeekDates(selectedDate);
                const updatedEvents = { ...events };
                let copied = 0;
                weekDates.forEach(dk => {
                    const nextDk = (() => {
                        const d = new Date(dk + 'T00:00:00');
                        d.setDate(d.getDate() + 7);
                        return d.toISOString().split('T')[0];
                    })();
                    if (events[dk] && events[dk].length > 0) {
                        const newShifts = events[dk].map(s => ({
                            ...s,
                            id: `shift-${Date.now()}-${Math.random().toString(36).slice(2)}`,
                            date: nextDk
                        }));
                        updatedEvents[nextDk] = [...(updatedEvents[nextDk] || []), ...newShifts];
                        copied += newShifts.length;
                    }
                });
                setEvents(updatedEvents);
                saveToStorage(STORAGE_KEYS.SHIFTS, updatedEvents);
                showNotification(`✅ Copied ${copied} shift(s) to next week`);
            }

            function addRecurringShifts(baseShift, repeat, weeks) {
                const updatedEvents = { ...events };
                const addShift = (dk) => {
                    if (!updatedEvents[dk]) updatedEvents[dk] = [];
                    updatedEvents[dk].push({
                        ...baseShift,
                        id: `shift-${Date.now()}-${Math.random().toString(36).slice(2)}`,
                        date: dk
                    });
                };
                addShift(baseShift.date);
                if (repeat === 'once') { /* already added */ }
                else if (repeat === 'daily') {
                    for (let i = 1; i < weeks * 7; i++) {
                        const d = new Date(baseShift.date + 'T00:00:00');
                        d.setDate(d.getDate() + i);
                        addShift(d.toISOString().split('T')[0]);
                    }
                } else if (repeat === 'weekly') {
                    for (let i = 1; i < weeks; i++) {
                        const d = new Date(baseShift.date + 'T00:00:00');
                        d.setDate(d.getDate() + 7 * i);
                        addShift(d.toISOString().split('T')[0]);
                    }
                } else if (repeat === 'weekdays') {
                    const baseDow = new Date(baseShift.date + 'T00:00:00').getDay();
                    // Mon-Fri from Monday of this week, for `weeks` weeks
                    const weekStart = new Date(baseShift.date + 'T00:00:00');
                    weekStart.setDate(weekStart.getDate() - baseDow + 1); // Monday
                    for (let w = 0; w < weeks; w++) {
                        for (let d = 0; d < 5; d++) {
                            const dt = new Date(weekStart);
                            dt.setDate(weekStart.getDate() + w * 7 + d);
                            const dk = dt.toISOString().split('T')[0];
                            if (dk !== baseShift.date) addShift(dk);
                        }
                    }
                }
                return updatedEvents;
            }

            function addTimeOff(empId, date) {
                const key = `${empId}__${date}`;
                const updated = { ...timeOff, [key]: { empId, date } };
                setTimeOff(updated);
                saveToStorage('reception_timeoff', updated);
            }

            function removeTimeOff(empId, date) {
                const key = `${empId}__${date}`;
                const updated = { ...timeOff };
                delete updated[key];
                setTimeOff(updated);
                saveToStorage('reception_timeoff', updated);
            }

            function isTimeOff(empId, date) {
                return !!timeOff[`${empId}__${date}`];
            }

            function openAddShiftModal(dateKey) {
                setSelectedDate(dateKey);
                setAddShiftEmpId(null);
                setAddShiftStart('08:00');

                setAddShiftNote('');
                setIsAddModalOpen(true);

            // --- UI Elements ---
            const [shiftStatusFilter, setShiftStatusFilter] = useState('all');
            const [shiftSearch, setShiftSearch] = useState('');
            const calendarMatrix = useMemo(() => {
                const mIdx = currentDate.getMonth(), yIdx = currentDate.getFullYear();
                const total = new Date(yIdx, mIdx + 1, 0).getDate();
                const start = new Date(yIdx, mIdx, 1).getDay();
                const cells = [];
                // CALENDAR TALLER: min-h bumped to 180px
                for (let i = 0; i < start; i++) cells.push(<div key={`e-${i}`} className="min-h-[180px] bg-white/[0.01] border border-white/[0.03]" />);
                for (let d = 1; d <= total; d++) {
                    const dk = `${yIdx}-${String(mIdx + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    let dayShifts = events[dk] || [];
                    if (shiftStatusFilter === 'confirmed') dayShifts = dayShifts.filter(s => s.confirmed);
                    if (shiftStatusFilter === 'pending') dayShifts = dayShifts.filter(s => !s.confirmed);
                    if (shiftSearch.trim()) {
                        const search = shiftSearch.trim().toLowerCase();
                        dayShifts = dayShifts.filter(s => {
                            const emp = staff[s.empId]?.name?.toLowerCase() || '';
                            return emp.includes(search) || dk.includes(search);
                        });
                    }
                    // Check for time-off markers
                    const timeOffStaff = Object.values(staff).filter(s => isTimeOff(s.id, dk));
                    const isToday = new Date().toISOString().split('T')[0] === dk;
                    cells.push(
                        <div key={dk} onClick={() => setSelectedDate(dk)} style={{background: selectedDate === dk ? 'linear-gradient(135deg, rgba(184,115,51,0.15), rgba(139,90,43,0.1))' : 'linear-gradient(135deg, rgba(26,26,27,0.98), rgba(35,30,28,0.95))', border: selectedDate === dk ? '2px solid #b87333' : '1px solid rgba(184,115,51,0.3)', boxShadow: selectedDate === dk ? '0 0 20px rgba(184,115,51,0.4), inset 0 2px 0 rgba(255,255,255,0.1)' : 'inset 0 1px 0 rgba(255,255,255,0.05), inset 0 -1px 0 rgba(0,0,0,0.5)'}} className={`min-h-[180px] p-3 transition-all cursor-pointer relative group ${isToday ? 'border-l-4' : ''}`}>
                            {isToday && <div className="rivet" style={{top: '4px', left: '4px'}} />}
                            <div className="flex justify-between items-start">
                                <span style={{color: selectedDate === dk ? '#b87333' : '#8a8a8a', fontWeight: 900, fontSize: '1.5rem', textShadow: selectedDate === dk ? '0 0 10px rgba(184,115,51,0.5)' : 'none'}}>{d}</span>
                                <button onClick={(e) => { e.stopPropagation(); openAddShiftModal(dk); }} style={{background: 'linear-gradient(145deg, rgba(184,115,51,0.8), rgba(139,90,43,0.9))', border: '1px solid #b87333', padding: '4px 8px', color: '#1a1a1b', fontWeight: 900}} className="opacity-40 hover:opacity-100 transition-opacity"><IconPlus /></button>
                            </div>
                            {timeOffStaff.length > 0 && (
                                <div className="flex flex-wrap gap-1 mt-1">
                                    {timeOffStaff.map(s => (
                                        <span key={s.id} style={{background: 'rgba(100,0,0,0.5)', border: '1px solid #8b0000', borderRadius: '3px', padding: '1px 5px', fontSize: '9px', fontWeight: 900, color: '#f87171', textTransform: 'uppercase', letterSpacing: '0.05em'}}>OFF: {s.name}</span>
                                    ))}
                                </div>
                            )}
                            <div className="space-y-2 mt-2">
                                {dayShifts.length === 0 ? <div style={{color: '#b87333', fontSize: '9px', fontWeight: 900, letterSpacing: '0.1em', textTransform: 'uppercase'}} className="animate-pulse flex items-center gap-1 mt-2"><IconAlert /> NEEDS COVERAGE</div> : 
                                    dayShifts.map(s => (
                                        <div key={s.id} onClick={(e) => { e.stopPropagation(); setEditingShift(s); setEditShiftStart(s.start || s.time || '08:00'); setEditShiftEnd(s.end || '20:00'); setEditShiftNote(s.note || ''); }} 
                                            style={{background: 'linear-gradient(145deg, rgba(139,90,43,0.9), rgba(104,68,32,0.95))', border: '2px solid #8b5a2b', borderRadius: '4px', padding: '8px 12px', color: '#e0e0e0', fontWeight: 900, fontSize: '12px', letterSpacing: '0.05em', textTransform: 'uppercase', boxShadow: '0 3px 0 #5a3a1b, 0 6px 15px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.2)', position: 'relative'}} className="cursor-pointer transition-all hover:translate-y-[-2px]">
                                            <div className="rivet" style={{top: '3px', left: '3px', width: '6px', height: '6px'}} />
                                            <div className="rivet" style={{top: '3px', right: '3px', width: '6px', height: '6px'}} />
                                            <div className="flex items-center justify-between">
                                                <span>{staff[s.empId]?.name || '...'}</span>
                                                <span style={{opacity: 0.6, fontSize: '10px'}}>{(s.start || s.time) + (s.end ? ` - ${s.end}` : '')}</span>
                                            </div>
                                            {s.note && <div style={{fontSize: '9px', opacity: 0.7, marginTop: '2px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'}}>{s.note}</div>}
                                        </div>
                                    ))
                                }
                            </div>
                        </div>
                    );
                }
                return cells;
            }, [currentDate, events, selectedDate, staff, shiftStatusFilter, shiftSearch, timeOff]);

            return (
                <div className="flex h-screen w-screen bg-black overflow-hidden text-xs">
                    {/* NAV RAIL */}
                    <nav style={{background: 'linear-gradient(180deg, #1a1a1b 0%, #0f0f10 100%)', borderRight: '2px solid rgba(184,115,51,0.3)', boxShadow: 'inset -2px 0 5px rgba(0,0,0,0.5)'}} className="no-print w-16 flex flex-col items-center py-8 gap-6">
                        <div style={{color: '#b87333', fontWeight: 900, fontSize: '1.2rem', textShadow: '0 0 10px rgba(184,115,51,0.6)', letterSpacing: '0.1em'}}>DS</div>
                        
                        {/* PANIC BUTTON */}
                        <button 
                            onClick={() => {
                                setShowPanicAlert(true);
                                const alert = {
                                    id: Date.now(),
                                    user: 'Reception',
                                    timestamp: new Date().toISOString(),
                                    location: 'Reception Desk',
                                    resolved: false
                                };
                                const updated = [alert, ...panicAlerts];
                                setPanicAlerts(updated);
                                saveToStorage('panic_alerts', updated);
                                showNotification('🚨 EMERGENCY ALERT SENT');
                            }}
                            style={{background: 'linear-gradient(145deg, rgba(139,0,0,0.9), rgba(80,0,0,0.95))', border: '2px solid #8b0000', borderRadius: '50%', padding: '14px', boxShadow: '0 4px 0 #4a0000, 0 8px 20px rgba(139,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2)', position: 'relative'}}
                            className="transition-all hover:translate-y-[-2px] animate-pulse"
                            title="EMERGENCY ALERT"
                        >
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="white" stroke="white" strokeWidth="2">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="12"/>
                                <line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                        </button>
                        
                        {/* De-escalation Quick Reference */}
                        <button 
                            onClick={() => setShowDeescalation(true)}
                            style={{background: 'linear-gradient(145deg, rgba(139,90,43,0.8), rgba(104,68,32,0.9))', border: '2px solid #8b5a2b', borderRadius: '4px', padding: '12px', boxShadow: '0 3px 0 #5a3a1b, 0 6px 15px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2)'}}
                            className="transition-all hover:translate-y-[-2px]"
                            title="De-escalation Scripts"
                        >
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                            </svg>
                        </button>
                        
                        {/* Team Kudos */}
                        <button 
                            onClick={() => setShowKudos(true)}
                            style={{background: 'linear-gradient(145deg, rgba(139,90,43,0.8), rgba(104,68,32,0.9))', border: '2px solid #8b5a2b', borderRadius: '4px', padding: '12px', boxShadow: '0 3px 0 #5a3a1b, 0 6px 15px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2)'}}
                            className="transition-all hover:translate-y-[-2px]"
                            title="Kudos Wall"
                        >
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                            </svg>
                        </button>
                        
                        {/* Achievements */}
                        <button 
                            onClick={() => setShowAchievements(true)}
                            style={{background: 'linear-gradient(145deg, rgba(139,90,43,0.8), rgba(104,68,32,0.9))', border: '2px solid #8b5a2b', borderRadius: '4px', padding: '12px', boxShadow: '0 3px 0 #5a3a1b, 0 6px 15px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2)'}}
                            className="transition-all hover:translate-y-[-2px]"
                            title="Team Achievements"
                        >
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                            </svg>
                        </button>
                        
                        <button onClick={handleMasterReset} style={{background: 'linear-gradient(145deg, rgba(139,90,43,0.7), rgba(104,68,32,0.85))', border: '2px solid #8b5a2b', borderRadius: '4px', padding: '12px', boxShadow: '0 3px 0 #5a3a1b, 0 6px 15px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2)'}} className="transition-all hover:translate-y-[-2px]" title="Admin Master Reset"><IconSync /></button>
                        <button onClick={saveBaseline} style={{background: 'linear-gradient(145deg, rgba(139,90,43,0.7), rgba(104,68,32,0.85))', border: '2px solid #8b5a2b', borderRadius: '4px', padding: '12px', boxShadow: '0 3px 0 #5a3a1b, 0 6px 15px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2)'}} className="transition-all hover:translate-y-[-2px]" title="Save Baseline for Month">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b87333" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        </button>
                        <button onClick={restoreBaseline} style={{background: 'linear-gradient(145deg, rgba(139,90,43,0.7), rgba(104,68,32,0.85))', border: '2px solid #8b5a2b', borderRadius: '4px', padding: '12px', boxShadow: '0 3px 0 #5a3a1b, 0 6px 15px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2)'}} className="transition-all hover:translate-y-[-2px]" title="Restore Baseline for Month">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b87333" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                        </button>
                        <button onClick={() => setIsPersonnelModalOpen(true)} style={{background: 'linear-gradient(145deg, rgba(139,90,43,0.7), rgba(104,68,32,0.85))', border: '2px solid #8b5a2b', borderRadius: '4px', padding: '12px', boxShadow: '0 3px 0 #5a3a1b, 0 6px 15px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2)'}} className="transition-all hover:translate-y-[-2px]" title="Personnel Manifest"><IconPersonnel /></button>
                        <div className="mt-auto flex flex-col items-center gap-3">
                            <div className="rivet" style={{width: '10px', height: '10px', boxShadow: '0 0 10px rgba(184,115,51,0.6), inset 0 1px 2px rgba(0,0,0,0.8)'}} title="Local Storage Ready" />
                            <div style={{opacity: 0.3, fontSize: '7px', fontWeight: 900, textTransform: 'uppercase', transform: 'rotate(90deg)', letterSpacing: '0.2em', color: '#8b5a2b'}}>PROTOCOL</div>
                        </div>
                    </nav>

                    <div className="flex-1 flex flex-col">
                        <header className="no-print h-10 bg-rose-950/20 border-b border-rose-500/30 flex items-center px-6 gap-4 text-left font-bold">
                            <div className="flex items-center gap-2 text-rose-500 font-black text-[9px] uppercase tracking-widest alert-pulse shrink-0"><IconAlert /> Critical Intel</div>
                            <input value={globalAlert} onChange={e => { 
                                const newAlert = String(e.target.value);
                                setGlobalAlert(newAlert);
                                saveToStorage(STORAGE_KEYS.ALERT, newAlert);
                            }} className="flex-1 bg-transparent border-none text-[11px] font-bold text-white outline-none placeholder-rose-900" placeholder="Broadcast immediate hub directive..." />
                            <div className={`text-[9px] font-black uppercase tracking-wider px-3 py-1 rounded-full ${isFirebaseAvailable ? 'bg-green-600/20 text-green-400 border border-green-500/40' : 'bg-amber-600/20 text-amber-400 border border-amber-500/40'}`} title={isFirebaseAvailable ? 'Multi-user mode: Data synced via Firebase' : 'Single-user mode: Data stored locally only'}>
                                {isFirebaseAvailable ? '🌐 LIVE SYNC' : '💾 LOCAL MODE'}
                            </div>
                            <button className="fancy-btn ml-4" onClick={() => {
                                const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                                document.body.setAttribute('data-theme', theme);
                                localStorage.setItem('reception_theme', theme);
                            }}>
                                Toggle {document.body.getAttribute('data-theme') === 'dark' ? 'Light' : 'Dark'} Mode
                            </button>
                        </header>

                        <div className="flex-1 flex overflow-hidden">
                            {/* SIDEBAR LOGS */}
                            <aside className="no-print w-80 bg-[#080808] border-r border-white/5 p-5 flex flex-col gap-4 overflow-y-auto no-scrollbar">
                                <header className="text-left mb-2 text-white font-black">
                                    <h1 style={{fontSize: '1.125rem', letterSpacing: '-0.05em', textTransform: 'uppercase', color: '#b87333', textShadow: '0 0 10px rgba(184,115,51,0.5)'}}>Shift Report</h1>
                                    <div style={{fontSize: '10px', color: '#8b5a2b', fontWeight: 900, textTransform: 'uppercase', marginTop: '4px', letterSpacing: '0.2em'}}>{selectedDate}</div>
                                </header>
                                <div className="space-y-3">
                                    {REPORT_FIELDS.map(f => (

                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-yellow-900/20 p-4 rounded-lg border-2 border-yellow-500 text-center">
                                            <div className="text-4xl mb-2">🌟</div>
                                            <div className="text-yellow-400 font-bold">Early Bird</div>
                                            <div className="text-xs text-white/70">Always on time</div>
                                        </div>
                                        <div className="bg-blue-900/20 p-4 rounded-lg border-2 border-blue-500 text-center">
                                            <div className="text-4xl mb-2">🦸</div>
                                            <div className="text-blue-400 font-bold">Crisis Hero</div>
                                            <div className="text-xs text-white/70">Calm under pressure</div>
                                        </div>
                                        <div className="bg-green-900/20 p-4 rounded-lg border-2 border-green-500 text-center">
                                            <div className="text-4xl mb-2">🤝</div>
                                            <div className="text-green-400 font-bold">Team Player</div>
                                            <div className="text-xs text-white/70">Always helps others</div>
                                        </div>
                                        <div className="bg-purple-900/20 p-4 rounded-lg border-2 border-purple-500 text-center">
                                            <div className="text-4xl mb-2">📝</div>
                                            <div className="text-purple-400 font-bold">Detail Master</div>
                                            <div className="text-xs text-white/70">Perfect shift reports</div>
                                        </div>
                                        <div className="bg-pink-900/20 p-4 rounded-lg border-2 border-pink-500 text-center">
                                            <div className="text-4xl mb-2">💪</div>
                                            <div className="text-pink-400 font-bold">Iron Person</div>
                                            <div className="text-xs text-white/70">30 days streak</div>
                                        </div>
                                        <div className="bg-red-900/20 p-4 rounded-lg border-2 border-red-500 text-center">
                                            <div className="text-4xl mb-2">🔥</div>
                                            <div className="text-red-400 font-bold">Hot Streak</div>
                                            <div className="text-xs text-white/70">Most shifts this month</div>
                                        </div>
                                    </div>
                                    <div className="mt-6 bg-white/5 p-4 rounded-lg text-center">
                                        <div className="text-cyan-400 font-bold mb-2">🎉 Team Stats</div>
                                        <div className="text-white text-sm space-y-1">
                                            <div>Total Shifts: <span className="font-black text-cyan-400">{Object.values(events).flat().length}</span></div>
                                            <div>Team Members: <span className="font-black text-cyan-400">{Object.keys(staff).length}</span></div>
                                            <div>Kudos Shared: <span className="font-black text-pink-400">{kudosWall.length}</span></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Register Service Worker for offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Use relative path to work with GitHub Pages subdirectory deployment
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('✅ Service Worker registered successfully:', registration);
                        console.log('📱 App is now installable as a PWA');
                    })
                    .catch(err => {
                        console.warn('⚠️ Service Worker registration failed (PWA features unavailable):', err);
                        // App still works without service worker, just no offline caching
                    });
            });
        }
    </script>
</body>
</html>
