                    if (data && Object.keys(data).length > 0) {
                        const normalized = normalizeUsers(data);
                        try { localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(normalized)); } catch(e) {}
                        setUsers(normalized);
                    }
                }));

                // Settings
                unsubs.push(db.collection('shared').doc('settings').onSnapshot(snap => {
                    if (!snap.exists || snap.metadata.hasPendingWrites) return;
                    const data = snap.data();
                    if (data && Object.keys(data).length > 0) {
                        const normalized = normalizeSettings(data);
                        try { localStorage.setItem(STORAGE_KEYS.SETTINGS, JSON.stringify(normalized)); } catch(e) {}
                        setAppSettings(normalized);
                    }
                }));

                // Team chat messages (real-time collection)
                let prevMessageCount = messages.length;
                unsubs.push(db.collection('messages').orderBy('createdAt', 'asc').onSnapshot(snap => {
                    const msgs = snap.docs.map(d => d.data());
                    const newCount = msgs.length;
                    
                    // Detect new messages and show notification
                    if (newCount > prevMessageCount && newCount > 0) {
                        const newMsg = msgs[newCount - 1];
                        const msgAuthor = String(newMsg?.user || '').toLowerCase();
                        const currentIdentity = String(currentUser?.displayName || currentUser?.username || 'USER').toLowerCase();
                        if (msgAuthor && msgAuthor !== currentIdentity) {
                            showNotification(`New message from ${newMsg.user}`, 'info', true);
                        }
                    }
                    
                    prevMessageCount = newCount;
                    setMessages(msgs);
                }));

                // Checklist template (shared, so any device can load it)
                unsubs.push(db.collection('shared').doc('checklistTemplate').onSnapshot(snap => {
                    if (!snap.exists || snap.metadata.hasPendingWrites) return;
                    const data = snap.data();
                    if (data?.items) {
                        try { localStorage.setItem('reception_checklist_template', JSON.stringify(data.items)); } catch(e) {}
                    }
                }));

                // Global alert broadcast
                unsubs.push(db.collection('shared').doc('alert').onSnapshot(snap => {
                    if (!snap.exists || snap.metadata.hasPendingWrites) return;
                    const data = snap.data();
                    if (typeof data?.text === 'string') {
                        try { localStorage.setItem(STORAGE_KEYS.ALERT, JSON.stringify(data.text)); } catch(e) {}
                        setGlobalAlert(data.text);
                    }
                }));

                return () => unsubs.forEach(u => u());
            }, []);

            // --- Schedule Failsafe (accessible directly on calendar, no admin gate) ---
            // NOTE: These operate on SHIFTS/SCHEDULE data only.
            function saveScheduleSnapshot() {
                const mIdx = currentDate.getMonth(), yIdx = currentDate.getFullYear();
                const key = `schedule_snapshot_${yIdx}_${String(mIdx+1).padStart(2,'0')}`;
                saveToStorage(key, events);
                showNotification(`Schedule snapshot saved for ${currentDate.toLocaleDateString(undefined, {month:'long', year:'numeric'})}.`);
            }

            function restoreScheduleSnapshot() {
                const mIdx = currentDate.getMonth(), yIdx = currentDate.getFullYear();
                const key = `schedule_snapshot_${yIdx}_${String(mIdx+1).padStart(2,'0')}`;
                const snapshot = loadFromStorage(key);
                if (!snapshot) {
                    showNotification('No snapshot found for this month. Save one first.', 'error');
                    return;
                }
                if (!window.confirm('Restore saved schedule snapshot? This will overwrite all current shifts for every month.')) return;
                setEvents(snapshot);
                saveToStorage(STORAGE_KEYS.SHIFTS, snapshot);
                showNotification('Schedule snapshot restored.');
            }

            function clearMonthSchedule() {
                const mIdx = currentDate.getMonth(), yIdx = currentDate.getFullYear();
                const monthLabel = currentDate.toLocaleDateString(undefined, {month:'long', year:'numeric'});
                if (!window.confirm(`Clear ALL shifts for ${monthLabel}? This cannot be undone unless you have a saved snapshot.`)) return;
                const prefix = `${yIdx}-${String(mIdx+1).padStart(2,'0')}-`;
                const updated = Object.fromEntries(Object.entries(events).filter(([k]) => !k.startsWith(prefix)));
                setEvents(updated);
                saveToStorage(STORAGE_KEYS.SHIFTS, updated);
                showNotification(`All shifts cleared for ${monthLabel}.`, 'error');
            }

            // --- Admin Master Reset Pattern ---
            // --- Baseline Save/Restore ---
            function saveBaseline() {
                if (!requireAdmin()) return;
                // Save current staff and shifts as baseline for the current month
                const mIdx = currentDate.getMonth(), yIdx = currentDate.getFullYear();
                const key = `baseline_${yIdx}_${String(mIdx+1).padStart(2,'0')}`;
                const baseline = {
                    staff,
                    shifts: events
                };
                saveToStorage(key, baseline);
                alert('Baseline for this month saved!');
            }

            function restoreBaseline() {
                if (!requireAdmin()) return;
                const mIdx = currentDate.getMonth(), yIdx = currentDate.getFullYear();
                const key = `baseline_${yIdx}_${String(mIdx+1).padStart(2,'0')}`;
                const baseline = loadFromStorage(key);
                if (!baseline) {
                    alert('No baseline saved for this month.');
                    return;
                }
                setStaff(baseline.staff);
                setEvents(baseline.shifts);
                saveToStorage(STORAGE_KEYS.STAFF, baseline.staff);
                saveToStorage(STORAGE_KEYS.SHIFTS, baseline.shifts);
                alert('Baseline restored for this month!');
            }

            function handleMasterReset() {
                if (!requireAdmin()) return;
                const year = new Date().getFullYear();
                if (!confirm(`ADMIN MASTER RESET: Clear all saved data for ${year} and keep only core app settings/accounts?`)) return;
                clearAllStorage();
                ensureCoreDataInitialized();
                loadDataFromStorage();
                alert('Master reset complete!');
            }

            function toMinutes(timeText) {
                const [h, m] = String(timeText || '00:00').split(':').map(Number);
                return (h * 60) + (m || 0);
            }

            function hasShiftConflict(sourceEvents, empId, dateKey, start, end, excludeShiftId = null) {
                const startMinutes = toMinutes(start);
                const endMinutes = toMinutes(end);
                const sameDay = sourceEvents[dateKey] || [];
                return sameDay.some(shift => {
                    if (shift.id === excludeShiftId) return false;
                    if (shift.empId !== empId) return false;
                    const shiftStart = shift.start || shift.time || '08:00';
                    const shiftEnd = shift.end || '20:00';
                    const shiftStartMinutes = toMinutes(shiftStart);
                    const shiftEndMinutes = toMinutes(shiftEnd);
                    return startMinutes < shiftEndMinutes && shiftStartMinutes < endMinutes;
                });
            }

            function createShiftForDate(empId, dateKey, start = '08:00', end = '20:00', options = {}) {
                const { silent = false } = options;
                const updatedEvents = { ...events };
                if (hasShiftConflict(updatedEvents, empId, dateKey, start, end)) {
                    if (!silent) {
                        showNotification(`${staff[empId]?.name || 'Staff'} already has an overlapping shift on ${dateKey}.`, 'error');
                    }
                    return false;
                }
                if (!updatedEvents[dateKey]) updatedEvents[dateKey] = [];
                const newShift = {
                    id: `shift-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
                    date: dateKey,
                    empId,
                    start,
                    end,
                    confirmed: true,
                    createdAt: Date.now()
                };
                updatedEvents[dateKey] = [...updatedEvents[dateKey], newShift];
                setEvents(updatedEvents);
                saveToStorage(STORAGE_KEYS.SHIFTS, updatedEvents);
                return true;
            }

            function toggleBulkWeekday(dayIndex) {
                setBulkAssign(previous => {
                    const exists = previous.weekdays.includes(dayIndex);
                    const weekdays = exists
                        ? previous.weekdays.filter(day => day !== dayIndex)
                        : [...previous.weekdays, dayIndex].sort((a, b) => a - b);
                    return { ...previous, weekdays };
                });
            }

            function applyBulkAssignments() {
                if (!bulkAssign.empId) {
                    showNotification('Select a staff member for bulk scheduling.', 'error');
                    return;
                }
                if (!bulkAssign.weekdays.length) {
                    showNotification('Select at least one weekday.', 'error');
                    return;
                }
                if (bulkAssign.rangeEnd < bulkAssign.rangeStart) {
                    showNotification('Bulk range end date must be after start date.', 'error');
                    return;
                }

                const updatedEvents = { ...events };
                let created = 0;
                let skipped = 0;

                const cursor = new Date(`${bulkAssign.rangeStart}T00:00:00`);
                const endDate = new Date(`${bulkAssign.rangeEnd}T00:00:00`);
                while (cursor <= endDate) {
                    const weekday = cursor.getDay();
                    if (bulkAssign.weekdays.includes(weekday)) {
                        const dateKey = cursor.toISOString().split('T')[0];
                        if (!hasShiftConflict(updatedEvents, bulkAssign.empId, dateKey, bulkAssign.start, bulkAssign.end)) {
                            if (!updatedEvents[dateKey]) updatedEvents[dateKey] = [];
                            updatedEvents[dateKey] = [
                                ...updatedEvents[dateKey],
                                {
                                    id: `shift-${Date.now()}-${Math.random().toString(36).slice(2, 8)}-${created}`,
                                    date: dateKey,
                                    empId: bulkAssign.empId,
                                    start: bulkAssign.start,
                                    end: bulkAssign.end,
                                    confirmed: true,
                                    createdAt: Date.now()
                                }
                            ];
                            created += 1;
                        } else {
                            skipped += 1;
                        }
                    }
                    cursor.setDate(cursor.getDate() + 1);
                }

                setEvents(updatedEvents);
                saveToStorage(STORAGE_KEYS.SHIFTS, updatedEvents);
                setIsBulkAssignOpen(false);
                showNotification(`Bulk scheduling complete: ${created} added, ${skipped} skipped.`);
            }

            function handleStaffDragStart(event, staffId) {
                if (event?.dataTransfer) {
                    event.dataTransfer.effectAllowed = 'move';
                    event.dataTransfer.setData('text/plain', `staff:${staffId}`);
                }
                setDraggedStaff(staffId);
                setDraggedShift(null);
            }

            function handleShiftDragStart(event, shift, fromDate) {
                if (event?.dataTransfer) {
                    event.dataTransfer.effectAllowed = 'move';
                    event.dataTransfer.setData('text/plain', `shift:${fromDate}:${shift.id}`);
                }
                setDraggedShift({ shift, fromDate });
                setDraggedStaff(null);
            }

            function handleCalendarDragOver(event, dateKey) {
                event.preventDefault();
                if (event?.dataTransfer) {
                    event.dataTransfer.dropEffect = 'move';
                }
                if (dragOverDate !== dateKey) {
                    setDragOverDate(dateKey);
                }
            }

            function handleCalendarDrop(event, dateKey) {
                event.preventDefault();

                let staffToDrop = draggedStaff;
                let shiftToDrop = draggedShift;
                const payload = event?.dataTransfer?.getData('text/plain') || '';
                if (!staffToDrop && !shiftToDrop && payload.startsWith('staff:')) {
                    staffToDrop = payload.slice(6);
                }
                if (!shiftToDrop && payload.startsWith('shift:')) {
                    const [, fromDate, shiftId] = payload.split(':');
                    const foundShift = (events[fromDate] || []).find(item => item.id === shiftId);
                    if (foundShift) {
                        shiftToDrop = { shift: foundShift, fromDate };
                    }
                }

                if (staffToDrop) {
                    const created = createShiftForDate(staffToDrop, dateKey, appSettings.defaultShiftStart || '08:00', appSettings.defaultShiftEnd || '20:00');
                    if (created) {
                        showNotification(`Scheduled ${staff[staffToDrop]?.name || 'staff'} on ${dateKey}.`);
                    }
                }

                if (shiftToDrop) {
                    const { shift, fromDate } = shiftToDrop;
                    if (fromDate !== dateKey) {
                        const updatedEvents = { ...events };
                        const movingStart = shift.start || shift.time || '08:00';
                        const movingEnd = shift.end || '20:00';
                        if (hasShiftConflict(updatedEvents, shift.empId, dateKey, movingStart, movingEnd, shift.id)) {
                            showNotification(`${staff[shift.empId]?.name || 'Staff'} already has an overlapping shift on ${dateKey}.`, 'error');
                            setDraggedStaff(null);
                            setDraggedShift(null);
                            setDragOverDate(null);
                            return;
                        }
                        const fromList = [...(updatedEvents[fromDate] || [])].filter(item => item.id !== shift.id);
                        if (fromList.length > 0) {
                            updatedEvents[fromDate] = fromList;
                        } else {
                            delete updatedEvents[fromDate];
                        }
                        if (!updatedEvents[dateKey]) updatedEvents[dateKey] = [];
                        updatedEvents[dateKey] = [...updatedEvents[dateKey], { ...shift, date: dateKey }];
                        setEvents(updatedEvents);
                        saveToStorage(STORAGE_KEYS.SHIFTS, updatedEvents);
                        showNotification(`Moved ${staff[shift.empId]?.name || 'shift'} to ${dateKey}.`);
                    }
                }

                setDraggedStaff(null);
                setDraggedShift(null);
                setDragOverDate(null);
            }

            function handleCalendarDragLeave(dateKey) {
                if (dragOverDate === dateKey) {
                    setDragOverDate(null);
                }
            }

            // --- UI Elements ---
            const [shiftStatusFilter, setShiftStatusFilter] = useState('all');
            const [shiftSearch, setShiftSearch] = useState('');
            const [dayNotes, setDayNotes] = useState(() => loadFromStorage(STORAGE_KEYS.DAY_NOTES, {}));
            const [selectedDayForNote, setSelectedDayForNote] = useState(null);
            const calendarMatrix = useMemo(() => {
                const mIdx = currentDate.getMonth(), yIdx = currentDate.getFullYear();
                const total = new Date(yIdx, mIdx + 1, 0).getDate();
                const weekOffset = appSettings.weekStartsOnMonday ? 1 : 0;
                const start = (new Date(yIdx, mIdx, 1).getDay() - weekOffset + 7) % 7;
                const minCellHeight = appSettings.compactCalendar ? '140px' : '180px';
                const coverageStartMinutes = toMinutes(appSettings.defaultShiftStart || '08:00');
                const coverageEndMinutes = Math.max(coverageStartMinutes + 60, toMinutes(appSettings.defaultShiftEnd || '20:00'));
                const largeGapAlertMinutes = 60;
                const unacknowledgedAppliedChanges = scheduleChangeAlerts.filter(alert => alert.alertType === 'applied' && !alert.acknowledgedAt);
                const unacknowledgedAppliedDates = new Set(unacknowledgedAppliedChanges.map(alert => alert.shiftDate));

                const formatGapDuration = (minutes) => {
                    const safe = Math.max(0, Math.round(minutes || 0));
                    const hours = Math.floor(safe / 60);
                    const mins = safe % 60;
                    if (hours > 0 && mins > 0) return `${hours}h ${mins}m`;
                    if (hours > 0) return `${hours}h`;
                    return `${mins}m`;
                };

                const getCoverageGapStats = (sourceShifts) => {
                    const ranges = (sourceShifts || [])
                        .map(shift => {
                            const rawStart = toMinutes(shift.start || shift.time || appSettings.defaultShiftStart || '08:00');
                            const rawEnd = toMinutes(shift.end || appSettings.defaultShiftEnd || '20:00');
                            let startMinute = Math.min(rawStart, rawEnd);
                            let endMinute = Math.max(rawStart, rawEnd);
                            if (startMinute === endMinute) endMinute = startMinute + 30;
                            startMinute = Math.max(coverageStartMinutes, startMinute);
                            endMinute = Math.min(coverageEndMinutes, endMinute);
                            if (endMinute <= startMinute) return null;
                            return [startMinute, endMinute];
                        })
                        .filter(Boolean)
                        .sort((a, b) => a[0] - b[0]);

                    if (ranges.length === 0) {
                        return {
                            largestGapMinutes: coverageEndMinutes - coverageStartMinutes,
                            totalGapMinutes: coverageEndMinutes - coverageStartMinutes
                        };
                    }

                    const merged = [];
                    ranges.forEach(([startMinute, endMinute]) => {
                        if (!merged.length || startMinute > merged[merged.length - 1][1]) {
                            merged.push([startMinute, endMinute]);
                            return;
                        }
                        merged[merged.length - 1][1] = Math.max(merged[merged.length - 1][1], endMinute);
                    });

                    let cursor = coverageStartMinutes;
                    let largestGapMinutes = 0;
                    let totalGapMinutes = 0;
                    merged.forEach(([startMinute, endMinute]) => {
                        if (startMinute > cursor) {
                            const gap = startMinute - cursor;
                            totalGapMinutes += gap;
                            largestGapMinutes = Math.max(largestGapMinutes, gap);
                        }
                        cursor = Math.max(cursor, endMinute);
                    });
                    if (cursor < coverageEndMinutes) {
                        const tailGap = coverageEndMinutes - cursor;
                        totalGapMinutes += tailGap;
                        largestGapMinutes = Math.max(largestGapMinutes, tailGap);
                    }

                    return { largestGapMinutes, totalGapMinutes };
                };

                const cells = [];
                for (let i = 0; i < start; i++) cells.push(<div key={`e-${i}`} style={{minHeight: minCellHeight}} className="bg-white/[0.01] border border-white/[0.03]" />);
                for (let d = 1; d <= total; d++) {
                    const dk = `${yIdx}-${String(mIdx + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const allDayShifts = events[dk] || [];
                    let dayShifts = allDayShifts;
                    if (shiftStatusFilter === 'confirmed') dayShifts = dayShifts.filter(s => s.confirmed);
                    if (shiftStatusFilter === 'pending') dayShifts = dayShifts.filter(s => !s.confirmed);
                    if (shiftSearch.trim()) {
                        const search = shiftSearch.trim().toLowerCase();
                        dayShifts = dayShifts.filter(s => {
                            const emp = staff[s.empId]?.name?.toLowerCase() || '';
                            return emp.includes(search) || dk.includes(search);
                        });
                    }
                    const coverageGapStats = getCoverageGapStats(allDayShifts);
                    const hasLargeCoverageGap = coverageGapStats.largestGapMinutes >= largeGapAlertMinutes;
                    const hasUnacknowledgedChange = unacknowledgedAppliedDates.has(dk);
                    const isToday = new Date().toISOString().split('T')[0] === dk;
                    cells.push(
                        <div key={dk}
                            onClick={() => setSelectedDate(dk)}
                            onDragOver={(event) => handleCalendarDragOver(event, dk)}
                            onDrop={(event) => handleCalendarDrop(event, dk)}
                            onDragLeave={() => handleCalendarDragLeave(dk)}
                            style={{minHeight: minCellHeight}}
                            className={`day-cell group ${isToday ? 'day-cell--today' : ''} ${selectedDate === dk ? 'day-cell--selected' : ''} ${dragOverDate === dk ? 'day-cell--drag-over' : ''} ${hasLargeCoverageGap ? 'day-cell--coverage-risk' : ''} ${hasUnacknowledgedChange ? 'day-cell--change-unacked' : ''}`}>
                            {isToday && <div className="rivet" style={{top: '4px', left: '4px'}} />}
                            <div className="flex justify-between items-start">
                                <span className="day-cell__num">{d}</span>
                                <button
                                    onClick={(e) => { e.stopPropagation(); setSelectedDate(dk); if (e.shiftKey) { quickAddShift(dk); } else { setIsAddModalOpen(true); } }}
                                    className="day-cell__add-btn"
                                    title="Click to open shift wizard. Shift+Click for quick-add default shift.">
                                    <IconPlus />
                                </button>
                            </div>
                            {hasLargeCoverageGap && (
                                <div className="day-cell__gap-alert" title={`Largest uncovered block: ${formatGapDuration(coverageGapStats.largestGapMinutes)}. Total uncovered: ${formatGapDuration(coverageGapStats.totalGapMinutes)}.`}>
                                    <IconAlert /> OPEN GAP {formatGapDuration(coverageGapStats.largestGapMinutes)}
                                </div>
                            )}
                            {dayNotes[dk] && (
                                <div className="text-[11px] font-bold text-amber-300 bg-black/50 p-2 rounded mt-2 mb-2 border-l-2 border-amber-400 line-clamp-2">
                                    📝 {dayNotes[dk]}
                                </div>
                            )}
                            <div className="space-y-2 mt-3">
                                {dayShifts.length === 0
                                    ? <div className="day-cell__empty"><IconAlert /> NEEDS COVERAGE</div>
                                    : dayShifts.map(s => (
                                        <div key={s.id}
                                            draggable
                                            onDragStart={(event) => { event.stopPropagation(); handleShiftDragStart(event, s, dk); }}
                                            onDragEnd={() => { setDraggedShift(null); setDragOverDate(null); }}
                                            onClick={(e) => { e.stopPropagation(); setEditingShift(s); }}
                                            className={`shift-card ${hasUnacknowledgedChange ? 'shift-card--change-unacked' : ''}`}>
                                            <div className="rivet" style={{top: '3px', left: '3px', width: '6px', height: '6px'}} />
                                            <div className="rivet" style={{top: '3px', right: '3px', width: '6px', height: '6px'}} />
                                            <div className="flex items-center justify-between gap-2">
                                                <span className="shift-card__identity flex items-center gap-2 min-w-0">
                                                    {appSettings.showStaffColorMarkers && <span className="shift-card__dot" style={{background: getStaffColor(s.empId)}} />}
                                                    <span style={{color: appSettings.showStaffColorMarkers ? getStaffColor(s.empId) : 'var(--text-primary)'}} className="shift-card__name truncate">{staff[s.empId]?.name || '...'}</span>
                                                </span>
                                                <span className="shift-card__time">{(s.start || s.time) + (s.end ? ` - ${s.end}` : '')}</span>
                                            </div>
                                        </div>
                                    ))
                                }
                            </div>
                            <div className="mt-3 flex justify-center">
                                <button
                                    onClick={() => setSelectedDayForNote(dk)}
                                    className="text-[11px] font-bold text-cyan-400 hover:text-cyan-300 transition-colors flex items-center gap-1"
                                    title="Add or edit note for this day"
                                >
                                    {dayNotes[dk] ? '✏️ Edit Note' : '+ Add Note'}
                                </button>
                            </div>
                        </div>
                    );
                }
                return cells;
            }, [currentDate, events, selectedDate, staff, shiftStatusFilter, shiftSearch, dragOverDate, appSettings.weekStartsOnMonday, appSettings.compactCalendar, appSettings.defaultShiftStart, appSettings.defaultShiftEnd, scheduleChangeAlerts, dayNotes]);

            const reportCompletion = getReportCompletion(reportData);
            const reportReadiness = getReportReadiness(reportData);
            const reportReadinessIssues = getReportReadinessIssues(reportReadiness);
            const reportReadinessHint = reportReadinessIssues.join(' ');
            const reportHandoffSummary = getReportHandoffSummary(reportData);
            const selectedDayShifts = events[selectedDate] || [];
            const reportActivityTimeline = getReportActivityTimeline(selectedDate, reportData, selectedDayShifts, checklist);
            const reportLastSavedAt = reportData?.__meta?.savedAt || null;
            const reportDirtyAgeMs = isReportDirty && reportDirtySinceAt ? Math.max(0, reportDirtyClock - reportDirtySinceAt) : 0;
            const reportDirtyAgeMinutes = Math.floor(reportDirtyAgeMs / 60000);
            const reportDirtyIsStale = reportDirtyAgeMs >= 15 * 60 * 1000;
            const navRailWidth = activeLayoutMode === 'panorama' ? '6.05rem' : activeLayoutMode === 'focus' ? '5.2rem' : '5.65rem';
            const reportSidebarWidth = activeLayoutMode === 'panorama'
                ? (activeSidebarDensity === 'airy' ? '27rem' : activeSidebarDensity === 'compact' ? '24rem' : '25.5rem')
                : activeLayoutMode === 'focus'
                    ? (activeSidebarDensity === 'airy' ? '22.5rem' : activeSidebarDensity === 'compact' ? '19.5rem' : '21rem')
                    : (activeSidebarDensity === 'airy' ? '24.5rem' : activeSidebarDensity === 'compact' ? '21.25rem' : '23rem');
            const mainContentPadding = activeLayoutMode === 'focus' ? '1.5rem' : activeLayoutMode === 'panorama' ? '2.35rem' : '2rem';
            const crewRank = currentUser ? crewPulse.leaderboard.findIndex(entry => entry.name.toLowerCase() === (currentUser.displayName || currentUser.username || '').toLowerCase()) + 1 : 0;
            const sidebarIdentity = (currentUserPreferences.callsign || '').trim() || currentUser?.displayName || currentUser?.username || 'Reception Crew';
            const portalThemeCards = [
                {
                    id: PERSONAL_THEME_DEFAULT,
                    label: 'Facility Default',
                    description: `Follow ${THEME_OPTIONS.find(theme => theme.id === (appSettings.theme || DEFAULT_THEME))?.label || 'facility'} automatically.`,
                    swatch: THEME_OPTIONS.find(theme => theme.id === (appSettings.theme || DEFAULT_THEME))?.swatch || THEME_OPTIONS[0].swatch
                },
                ...THEME_OPTIONS
            ];
            const sidebarQuickActions = [
                { id: 'portal', icon: '🎛', title: 'Crew Portal', hint: 'Themes, layout, callsign, effects', run: () => setIsSettingsOpen(true) },
                { id: 'kudos', icon: '💖', title: 'Kudos Wall', hint: 'Recognize a teammate fast', run: () => setShowKudos(true) },
                { id: 'achievements', icon: '🏆', title: 'Leaderboard', hint: 'See points, badges, and streaks', run: () => setShowAchievements(true) },
                { id: 'history', icon: '🗂', title: 'Report Browser', hint: 'Jump to a saved handoff instantly', run: openReportHistory }
            ];
            const unreadNotificationCount = notifications.filter(n => !n.read).length;
            const currentChatIdentity = String(currentUser?.displayName || currentUser?.username || 'USER').toLowerCase();
            const unreadChatCount = messages.filter(message => {
                const createdAt = Number(message?.createdAt || 0);
                if (!createdAt || createdAt <= chatLastSeenAt) return false;
                const author = String(message?.user || '').toLowerCase();
                return !!author && author !== currentChatIdentity;
            }).length;
            const activeMonthShiftCount = Object.keys(events).reduce((count, dateKey) => {
                const date = new Date(`${dateKey}T00:00:00`);
                if (date.getFullYear() !== currentDate.getFullYear() || date.getMonth() !== currentDate.getMonth()) return count;
                return count + (events[dateKey] || []).length;

                                        <button type="button" onClick={handleQuickStaffAccess} className="w-full" style={{padding: '10px 16px', fontSize: '11px', borderRadius: '10px', border: '1px solid rgba(255,255,255,0.2)', color: 'var(--text-primary)', background: 'rgba(255,255,255,0.03)'}}>QUICK STAFF ACCESS</button>
                                    </form>
                                    <div className="mt-5 text-center text-[12px] text-white/50">
                                        No account yet?{' '}
                                        <button type="button" onClick={() => { setLoginMode('register'); setLoginError(''); }} className="text-[var(--accent)] underline bg-transparent border-0 cursor-pointer p-0">Create one</button>
                                    </div>
                                    </>
                                )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Register Service Worker for offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Use relative path to work with GitHub Pages subdirectory deployment
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('✅ Service Worker registered successfully:', registration);
                        console.log('📱 App is now installable as a PWA');
                    })
                    .catch(err => {
                        console.warn('⚠️ Service Worker registration failed (PWA features unavailable):', err);
                        // App still works without service worker, just no offline caching
                    });
            });
        }
    </script>
</body>
</html>
