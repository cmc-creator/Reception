        body[data-theme="linen"] {

        body[data-theme="solstice"] {

            --text-primary: #fff7ed;

        body[data-theme="lagoon"] {
            --accent: #2dd4bf;
            --accent-dark: #0f766e;

            --accent-glow: rgba(45, 212, 191, 0.42);

            --bg-mid: #06171c;
            --bg-bottom: #041015;
            --panel-start: rgba(8, 28, 33, 0.96);

        body[data-theme="roseglass"] {

            --accent-soft: rgba(251, 113, 133, 0.24);
            --accent-glow: rgba(251, 113, 133, 0.42);
            --highlight: #f9a8d4;
            --highlight-glow: rgba(249, 168, 212, 0.45);
            --rivet-color: #831843;
            --panel-edge: #4a044e;
            --bg-top: #27101f;
            --bg-mid: #170c17;
            --bg-bottom: #0d0710;
            --panel-start: rgba(33, 15, 27, 0.96);
            --panel-end: rgba(61, 17, 43, 0.93);
            --texture-layer: radial-gradient(circle at 20% 18%, rgba(255,255,255,0.06) 0px, rgba(255,255,255,0) 4px), radial-gradient(circle at 80% 24%, rgba(249,168,212,0.09) 0px, rgba(249,168,212,0) 7px), repeating-linear-gradient(135deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 2px, transparent 2px, transparent 7px);

            --critical: #fb7185;

        /* Linen uses a bright background, so force stronger text contrast. */
        body[data-theme="linen"] [class*="text-white"] {
            color: #2f241b !important;
        }

        body[data-theme="linen"] .panel-input {
            background: rgba(255, 255, 255, 0.58);
            border-color: rgba(123, 97, 72, 0.4);
            color: #2f241b;
        }

        body[data-theme="linen"] .panel-input::placeholder {
            color: #7c6148;
        }

        .report-field-input {
            color: var(--text-primary);
        }

        .report-field-input::placeholder {
            color: var(--text-muted);
            opacity: 0.95;
        }

        .report-meta-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.5rem;
        }

        .report-meta-card {
            background: var(--surface-2);
            border: 1px solid var(--border-muted);
            border-radius: 8px;
            padding: 10px;
            text-align: left;
        }

        .report-meta-label {
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .report-meta-value {
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.2;
            font-weight: 900;
            margin-top: 6px;
            word-break: break-word;
        }

        body[data-theme="linen"] .report-meta-card {
            background: rgba(255, 255, 255, 0.72);
            border-color: rgba(123, 97, 72, 0.35);
        }

        body[data-theme="linen"] .report-field-input {
            background: rgba(255, 255, 255, 0.55);
            border-radius: 4px;
            padding: 6px;
        }

        /* Linen: tone down all white-glass surfaces in the sidebar */
        body[data-theme="linen"] .report-sidebar .crew-pulse-card,
        body[data-theme="linen"] .report-sidebar .sidebar-section,
        body[data-theme="linen"] .report-sidebar .report-field-card,
        body[data-theme="linen"] .report-sidebar .report-checklist-card,
        body[data-theme="linen"] .report-sidebar .intel-feed-card {
            background: rgba(180, 145, 100, 0.10);
            border-color: rgba(140, 105, 65, 0.28);
            box-shadow: 0 2px 8px rgba(100,70,40,0.08);
        }

        body[data-theme="linen"] .report-sidebar .report-mini-card {
            background: rgba(180, 145, 100, 0.12) !important;
            border-color: rgba(140, 105, 65, 0.28) !important;
        }

        body[data-theme="linen"] .report-sidebar .report-safety-bar {
            background: rgba(180, 145, 100, 0.12);
            border-color: rgba(140, 105, 65, 0.28);
        }

        body[data-theme="linen"] .report-sidebar .sidebar-quick-btn {
            background: rgba(180, 145, 100, 0.10);
            border-color: rgba(140, 105, 65, 0.28);
        }

        body[data-theme="linen"] .report-sidebar .fancy-btn {
            color: #fff8f0;
        }
        
        * {
            font-family: 'IBM Plex Sans', 'Segoe UI', Tahoma, sans-serif !important;
        }

        h1, h2, h3, .display-type {
            font-family: 'Space Grotesk', 'IBM Plex Sans', sans-serif !important;
            letter-spacing: 0.01em;
            line-height: 1.1;
        }

        .copy-rhythm {
            line-height: 1.45;
        }

        .modal-content-flow > * + * {
            margin-top: var(--space-3);
        }

        .modal-content-flow-tight > * + * {
            margin-top: var(--space-2);
        }

        .section-kicker {
            font-size: 10px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-weight: 900;
            color: var(--accent);
        }
        
        body {
            background: var(--texture-layer), radial-gradient(ellipse at top, var(--bg-top) 0%, var(--bg-mid) 50%, var(--bg-bottom) 100%) !important;
            color: var(--text-primary) !important;
            overflow: hidden;
            transition: background 0.25s ease, color 0.25s ease;
        }
        
        /* ═══ RIVETS & INDUSTRIAL DECORATIONS ═══ */
        .rivet {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #6a5a4a, var(--rivet-color) 60%, #3a2a1a);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.8), 0 1px 1px rgba(255,255,255,0.2);
        }
        
        /* ═══ INDUSTRIAL METAL PANELS ═══ */
        .glass-panel {
            background: linear-gradient(135deg, var(--panel-start) 0%, var(--panel-end) 100%);
            border: 2px solid var(--accent);
            border-radius: var(--radius-panel);
            position: relative;
            box-shadow: 
                0 0 20px var(--accent-glow),
                inset 0 2px 0 rgba(255, 255, 255, 0.1),
                inset 0 -2px 5px rgba(0, 0, 0, 0.6);
        }
        
        .glass-panel::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid var(--accent-soft);
            pointer-events: none;
        }
        
        .neon-blue {
            border: 2px solid var(--highlight);
            box-shadow: 0 0 28px var(--highlight-glow), 0 6px 24px rgba(0,0,0,0.6);
        }
        
        .neon-fuchsia {
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px var(--accent-glow), 0 6px 24px rgba(0,0,0,0.6);
        }
        
        .holo-text {
            text-shadow: 0 0 12px var(--highlight), 0 0 3px var(--accent);
        }
        
        /* ═══ MECHANICAL LEVER SWITCHES (BUTTONS) ═══ */
        .fancy-btn {
            background: linear-gradient(145deg, var(--accent), var(--accent-dark));
            color: #1a1a1b;
            border: 2px solid var(--accent);
            border-radius: 6px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            position: relative;
            box-shadow: 
                0 4px 0 var(--accent-dark),
                0 8px 20px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.1s;
        }
        
        .fancy-btn::before {
            content: '';
            position: absolute;
            inset: -4px;
            border: 2px solid var(--highlight);
            border-radius: 8px;
            opacity: 0;
            animation: borderGlow 2s ease-in-out infinite;
        }
        
        @keyframes borderGlow {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.6; box-shadow: 0 0 20px var(--highlight-glow); }
        }
        
        .fancy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 6px 0 var(--accent-dark),
                0 12px 30px var(--accent-glow);
        }
        
        .fancy-btn:active {
            transform: translateY(2px);
            box-shadow: 
                0 2px 0 var(--accent-dark),
                0 4px 10px rgba(0, 0, 0, 0.8);
        }

        .panel-input {
            width: 100%;
            background: rgba(10, 10, 12, 0.85);
            border: 2px solid var(--accent-soft);
            border-radius: var(--radius-soft);
            padding: 0.85rem 0.95rem;
            color: var(--text-primary);
            outline: none;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .panel-input:focus {
            border-color: var(--highlight);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.04), 0 0 18px var(--highlight-glow);
        }

        .data-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border-radius: 999px;
            padding: 0.22rem 0.65rem;
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            font-weight: 900;
            border: 1px solid var(--border-muted);
            background: var(--surface-1);
            color: var(--text-primary);
        }

        .surface-card {
            background: linear-gradient(135deg, var(--surface-1), var(--surface-3));
            border: 1px solid var(--border-muted);
            border-radius: 12px;
        }

        .soft-text {
            color: var(--text-soft);
        }

        .modal-action-row {
            position: sticky;
            top: 0;
            z-index: 6;
            padding-top: 8px;
            padding-bottom: 8px;
            background: linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0));
            backdrop-filter: blur(2px);
        }

        .modal-footer-sticky {
            position: sticky;
            bottom: 0;
            z-index: 6;
            padding-top: 10px;
            background: linear-gradient(0deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
        }

        button.text-4xl.leading-none,
        button.text-5xl.font-light,
        button.text-5xl.font-light.leading-none,
        button.absolute.top-4.right-4.text-2xl {
            min-width: 44px;
            min-height: 44px;
            padding: 6px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .modal-surface {
            animation: modalFadeIn 0.2s ease-out;
        }

        .modal-card-enter {
            animation: modalCardEnter 0.24s ease-out;
            transform-origin: center top;
        }

        .hover-lift {
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }

        .hover-lift:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35);
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body {

                radial-gradient(1200px 600px at 12% -10%, rgba(255,255,255,0.08), transparent 55%),

                linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 45%, var(--bg-bottom) 100%);
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            background: var(--texture-layer);
            opacity: 0.58;
            mix-blend-mode: screen;
        }

        body::after {
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.08), transparent 38%);
            opacity: 0.55;
        }

        .app-shell {
            min-height: 100vh;
            position: relative;
            isolation: isolate;
            z-index: 1;
        }

        .app-shell::before,
        .app-shell::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .app-shell::before {
            background:
                linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 18%, transparent 35%),
                linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.04) 25%, transparent 50%),
                radial-gradient(circle at 18% 15%, var(--accent-soft), transparent 28%),
                radial-gradient(circle at 82% 18%, rgba(255,255,255,0.08), transparent 24%);
            opacity: 0.18;
            transform: translate3d(0, 0, 0);
            animation: tracerFloat 24s linear infinite;
        }

        .app-shell::after {
            background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 20%, transparent 80%, rgba(0,0,0,0.18));
            opacity: 0.45;
        }

        @keyframes tracerFloat {
            0% { transform: translate3d(-1%, 0, 0) scale(1); }
            50% { transform: translate3d(1%, 1%, 0) scale(1.02); }
            100% { transform: translate3d(-1%, 0, 0) scale(1); }
        }

        /* ═══ CHAT ALERT TRACER ═══ */
        @keyframes chatAlertPulse {
            0%, 100% { 
                box-shadow: 
                    0 0 8px rgba(248, 113, 113, 0.4),
                    0 0 16px rgba(248, 113, 113, 0.25),
                    inset 0 0 8px rgba(248, 113, 113, 0.1);
                border-color: rgba(248, 113, 113, 0.65);
            }
            50% { 
                box-shadow: 
                    0 0 16px rgba(248, 113, 113, 0.8),
                    0 0 32px rgba(248, 113, 113, 0.5),
                    inset 0 0 12px rgba(248, 113, 113, 0.2);
                border-color: rgba(248, 113, 113, 0.95);
            }
        }

        @keyframes chatAlertSweep {
            0% {
                background-position: -200% center;
            }
            100% {
                background-position: 200% center;
            }
        }

        .chat-window-shell {
            position: relative;
            border: 2px solid var(--accent-soft);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .chat-window-shell--alert {
            animation: chatAlertPulse 1.6s ease-in-out infinite;
            background: linear-gradient(
                90deg,
                rgba(248, 113, 113, 0.08),
                rgba(248, 113, 113, 0.12),
                rgba(248, 113, 113, 0.08)
            );
            background-size: 200% 100%;
            animation: 
                chatAlertPulse 1.6s ease-in-out infinite,
                chatAlertSweep 2.4s linear infinite;
        }

        .chat-window-shell--alert::before {
            content: '';
            position: absolute;
            inset: -4px;
            border: 2px solid rgba(248, 113, 113, 0.4);
            border-radius: 10px;
            pointer-events: none;
            animation: chatAlertPulse 1.6s ease-in-out infinite;
            opacity: 0.8;
        }

            opacity: 0.12;

            function showNotification(msg, type = 'info', persistent = false) {
                const id = Date.now();
                setToasts(t => [...t, { id, msg, type }]);
                if (persistent) {
                    setNotifications(n => [...n, { id, msg, type, timestamp: new Date().toLocaleString(), read: false }]);
                }
                setTimeout(() => {
                    setToasts(t => t.filter(toast => toast.id !== id));
                }, 4000);
            }
            function dismissToast(id) {
                setToasts(t => t.filter(toast => toast.id !== id));
            }
            function dismissNotification(id) {
                setNotifications(n => n.filter(notif => notif.id !== id));
            }
            function markNotificationRead(id) {
                setNotifications(n => n.map(notif => notif.id === id ? {...notif, read: true} : notif));
            }

                // If Firebase Auth is available, use email login
                if (isFirebaseAvailable && auth && emailInput.includes('@')) {
                    try {
                        const cred = await auth.signInWithEmailAndPassword(emailInput, loginPassword);
                        const firebaseUser = cred.user;
                        // Look up or build profile from Firestore users map
                        const allUsers = loadFromStorage(STORAGE_KEYS.USERS, {});
                        const profile = Object.values(allUsers).find(u => u.email === firebaseUser.email || u.username === firebaseUser.email.split('@')[0]);
                        const account = profile || {
                            id: firebaseUser.uid,
                            username: firebaseUser.email.split('@')[0],
                            displayName: firebaseUser.displayName || firebaseUser.email.split('@')[0],
                            email: firebaseUser.email,
                            role: 'staff',
                            password: ''
                        };
                        setCurrentUser(account);
                        saveToStorage(STORAGE_KEYS.SESSION, { userId: account.id, loggedInAt: Date.now() });
                        setLoginPassword('');
                        setIsAuthModalOpen(false);
                        showNotification(`Signed in as ${account.displayName}.`);
                    } catch (err) {
                        setLoginError(err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found' ? 'Email or password is incorrect.' : err.message);
                    }
                    return;
                }

                // Fallback: legacy username/password lookup
                const normalizedUsername = emailInput;
                const account = Object.values(users).find(user => user.username.toLowerCase() === normalizedUsername && user.password === loginPassword);
                if (!account) {
                    setLoginError('Username or password did not match an account.');
                    return;

                setCurrentUser(account);
                saveToStorage(STORAGE_KEYS.SESSION, { userId: account.id, loggedInAt: Date.now() });
                setLoginError('');
                setLoginPassword('');
                setIsAuthModalOpen(false);
                showNotification(`Signed in as ${account.displayName}.`);
            }

            async function handleRegister(event) {
                event.preventDefault();
                setLoginError('');
                const email = loginUsername.trim().toLowerCase();
                if (!email.endsWith('@destinysprings.com')) {
                    setLoginError('You must use a @destinysprings.com email to register.');
                    return;
                }
                if (loginPassword.length < 6) {
                    setLoginError('Password must be at least 6 characters.');
                    return;
                }
                if (!isFirebaseAvailable || !auth) {
                    setLoginError('Registration requires a network connection.');
                    return;
                }
                try {
                    const cred = await auth.createUserWithEmailAndPassword(email, loginPassword);
                    const firebaseUser = cred.user;
                    const displayName = email.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                    const newProfile = {
                        id: firebaseUser.uid,
                        username: email.split('@')[0],
                        displayName,
                        email,
                        role: 'staff',
                        password: ''
                    };
                    // Save profile into users map and sync to Firestore
                    const nextUsers = { ...users, [newProfile.id]: newProfile };
                    persistUsers(nextUsers);
                    setCurrentUser(newProfile);
                    saveToStorage(STORAGE_KEYS.SESSION, { userId: newProfile.id, loggedInAt: Date.now() });
                    setLoginPassword('');
                    setIsAuthModalOpen(false);
                    showNotification(`Welcome, ${displayName}! Account created.`);
                } catch (err) {
                    setLoginError(err.code === 'auth/email-already-in-use' ? 'An account with that email already exists. Sign in instead.' : err.message);

            const achievementStats = useMemo(() => {
                const thisMonthStart = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
                const quarterStartMonth = Math.floor(currentDate.getMonth() / 3) * 3;
                const quarterStart = new Date(currentDate.getFullYear(), quarterStartMonth, 1);
                const includeDate = (dateKey) => {
                    if (achievementWindow === 'all') return true;
                    const d = new Date(`${dateKey}T00:00:00`);
                    if (achievementWindow === 'quarter') return d >= quarterStart;
                    return d >= thisMonthStart;
                };

                const periodShiftRows = Object.entries(events || {}).flatMap(([dateKey, dayShifts]) => {
                    if (!includeDate(String(dateKey))) return [];
                    return (dayShifts || []).map(shift => ({ ...shift, dateKey }));
                });

                const allShiftRows = Object.entries(events || {}).flatMap(([dateKey, dayShifts]) =>
                    (dayShifts || []).map(shift => ({ ...shift, dateKey }))
                );

                const nameFor = (staffId) => staff[staffId]?.name || 'Unknown';

                const byStaffMonth = {};
                periodShiftRows.forEach(shift => {
                    const staffId = shift.empId;
                    if (!staffId) return;
                    if (!byStaffMonth[staffId]) {
                        byStaffMonth[staffId] = {
                            count: 0,
                            weekend: 0,
                            starts: [],
                            days: new Set()
                        };
                    }
                    byStaffMonth[staffId].count += 1;
                    byStaffMonth[staffId].days.add(shift.dateKey);
                    const startText = shift.start || shift.time || appSettings.defaultShiftStart || '08:00';
                    byStaffMonth[staffId].starts.push(toMinutes(startText));
                    const dow = new Date(`${shift.dateKey}T00:00:00`).getDay();
                    if (dow === 0 || dow === 6) byStaffMonth[staffId].weekend += 1;
                });

                const topBy = (selector, predicate = () => true) => {
                    const entries = Object.entries(byStaffMonth).filter(([id]) => predicate(id));
                    if (!entries.length) return null;
                    entries.sort((a, b) => selector(b[1]) - selector(a[1]));
                    return entries[0];
                };

                const longestStreakByStaff = {};
                const datesByStaffAll = {};
                allShiftRows.forEach(shift => {
                    if (!shift.empId || !shift.dateKey) return;
                    if (!datesByStaffAll[shift.empId]) datesByStaffAll[shift.empId] = new Set();
                    datesByStaffAll[shift.empId].add(shift.dateKey);
                });

                Object.entries(datesByStaffAll).forEach(([staffId, dateSet]) => {
                    const ordered = [...dateSet].sort();
                    let longest = 0;
                    let current = 0;
                    let previousDate = null;
                    ordered.forEach(dateKey => {
                        const currentDateObj = new Date(`${dateKey}T00:00:00`);
                        if (!previousDate) {
                            current = 1;
                        } else {
                            const diff = Math.round((currentDateObj - previousDate) / (1000 * 60 * 60 * 24));
                            current = diff === 1 ? current + 1 : 1;
                        }
                        if (current > longest) longest = current;
                        previousDate = currentDateObj;
                    });
                    longestStreakByStaff[staffId] = longest;
                });

                const reportRowsMonth = Object.entries(allReports || {}).filter(([dateKey]) => includeDate(String(dateKey)));
                const reportByAuthor = {};
                reportRowsMonth.forEach(([, report]) => {
                    const author = report?.__meta?.savedBy;
                    if (!author) return;
                    reportByAuthor[author] = (reportByAuthor[author] || 0) + 1;
                });
                const topReportAuthor = Object.entries(reportByAuthor).sort((a, b) => b[1] - a[1])[0] || null;

                const cards = [];

                const mostShifts = topBy(stat => stat.count);
                if (mostShifts) {
                    cards.push({
                        icon: '🔥',
                        title: 'Hot Streak',
                        value: nameFor(mostShifts[0]),
                        detail: `${mostShifts[1].count} shifts in selected range`,
                        why: 'Awarded to the person with the highest shift count in the selected time range.',
                        theme: 'red'
                    });
                }

                const mostDays = topBy(stat => stat.days.size);
                if (mostDays) {
                    cards.push({
                        icon: '🧭',
                        title: 'Coverage Champion',
                        value: nameFor(mostDays[0]),
                        detail: `${mostDays[1].days.size} worked days this month`,
                        why: 'Counts unique calendar days worked, not number of shifts.',
                        theme: 'cyan'
                    });
                }

                const weekendWarrior = topBy(stat => stat.weekend, id => byStaffMonth[id].weekend > 0);
                if (weekendWarrior) {
                    cards.push({
                        icon: '🌙',
                        title: 'Weekend Warrior',
                        value: nameFor(weekendWarrior[0]),
                        detail: `${weekendWarrior[1].weekend} weekend shifts`,
                        why: 'Counts Saturday and Sunday assignments only.',
                        theme: 'purple'
                    });
                }

                const earlyBird = topBy(stat => {
                    if (!stat.starts.length) return -Infinity;
                    const avg = stat.starts.reduce((sum, m) => sum + m, 0) / stat.starts.length;
                    return -avg;
                }, id => byStaffMonth[id].starts.length >= 2);
                if (earlyBird) {
                    const avg = Math.round(earlyBird[1].starts.reduce((sum, m) => sum + m, 0) / earlyBird[1].starts.length);
                    const hour = String(Math.floor(avg / 60)).padStart(2, '0');
                    const minute = String(avg % 60).padStart(2, '0');
                    cards.push({
                        icon: '🌅',
                        title: 'Early Bird',
                        value: nameFor(earlyBird[0]),
                        detail: `avg start ${hour}:${minute}`,
                        why: 'Based on earliest average shift start across at least 2 shifts.',
                        theme: 'yellow'
                    });
                }

                const streakWinner = Object.entries(longestStreakByStaff).sort((a, b) => b[1] - a[1])[0] || null;
                if (streakWinner && streakWinner[1] > 1) {
                    cards.push({
                        icon: '💪',
                        title: 'Iron Person',
                        value: nameFor(streakWinner[0]),
                        detail: `${streakWinner[1]} day streak`,
                        why: 'Longest run of consecutive days with at least one shift.',
                        theme: 'pink'
                    });
                }

                if (topReportAuthor) {
                    cards.push({
                        icon: '📝',
                        title: 'Detail Master',
                        value: topReportAuthor[0],
                        detail: `${topReportAuthor[1]} reports saved`,
                        why: 'Most shift reports saved in selected time range.',
                        theme: 'green'
                    });
                }

                const themeClasses = {
                    yellow: 'bg-yellow-900/20 border-yellow-500 text-yellow-400',
                    cyan: 'bg-cyan-900/20 border-cyan-500 text-cyan-400',
                    purple: 'bg-purple-900/20 border-purple-500 text-purple-400',
                    green: 'bg-green-900/20 border-green-500 text-green-400',
                    pink: 'bg-pink-900/20 border-pink-500 text-pink-400',
                    red: 'bg-red-900/20 border-red-500 text-red-400'
                };

                return {
                    cards: cards.slice(0, 6).map(card => ({
                        ...card,
                        cardClass: themeClasses[card.theme] || themeClasses.cyan
                    })),
                    monthShiftCount: periodShiftRows.length,
                    totalShiftCount: allShiftRows.length,
                    staffCount: Object.keys(staff || {}).length,
                    kudosCount: kudosWall.length
                };
            }, [events, staff, allReports, kudosWall, currentDate, appSettings.defaultShiftStart, achievementWindow]);

            const crewPulse = useMemo(() => {
                const thisMonthStart = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
                const quarterStartMonth = Math.floor(currentDate.getMonth() / 3) * 3;
                const quarterStart = new Date(currentDate.getFullYear(), quarterStartMonth, 1);
                const includeTimestamp = (value) => {
                    if (achievementWindow === 'all') return true;
                    if (!value) return false;
                    const pointInTime = typeof value === 'string' && value.length <= 10
                        ? new Date(`${value}T00:00:00`)
                        : new Date(value);
                    if (Number.isNaN(pointInTime.getTime())) return false;
                    if (achievementWindow === 'quarter') return pointInTime >= quarterStart;
                    return pointInTime >= thisMonthStart;
                };

                const scoreboard = {};
                const ensureEntry = (rawName, extra = {}) => {
                    const normalizedName = String(rawName || '').trim();
                    if (!normalizedName) return null;
                    const key = normalizedName.toLowerCase();
                    if (!scoreboard[key]) {
                        scoreboard[key] = {
                            key,
                            name: normalizedName,
                            role: '',
                            shifts: 0,
                            reports: 0,
                            kudosReceived: 0,
                            kudosSent: 0,
                            points: 0
                        };
                    }
                    scoreboard[key] = { ...scoreboard[key], ...extra, name: extra.name || scoreboard[key].name };
                    return scoreboard[key];
                };

                Object.values(users || {}).forEach(user => {
                    ensureEntry(user.displayName || user.username, { name: user.displayName || user.username, role: user.role || '' });
                });

                Object.values(staff || {}).forEach(member => {
                    ensureEntry(member.name, { name: member.name });
                });

                Object.entries(events || {}).forEach(([dateKey, dayShifts]) => {
                    if (!includeTimestamp(dateKey)) return;
                    (dayShifts || []).forEach(shift => {
                        const entry = ensureEntry(staff[shift.empId]?.name || shift.empId);
                        if (!entry) return;
                        entry.shifts += 1;
                        entry.points += 3;
                    });
                });

                Object.entries(allReports || {}).forEach(([dateKey, report]) => {
                    if (!includeTimestamp(dateKey)) return;
                    const author = report?.__meta?.savedBy;
                    const entry = ensureEntry(author);
                    if (!entry) return;
                    entry.reports += 1;
                    entry.points += 5;
                });

                const inRangeKudos = (kudosWall || []).filter(kudo => includeTimestamp(kudo.timestamp));
                inRangeKudos.forEach(kudo => {
                    const receiver = ensureEntry(kudo.to);
                    if (receiver) {
                        receiver.kudosReceived += 1;
                        receiver.points += 4;
                    }
                    const sender = ensureEntry(kudo.from);
                    if (sender) {
                        sender.kudosSent += 1;
                        sender.points += 1;
                    }
                });

                const leaderboard = Object.values(scoreboard)
                    .filter(entry => entry.points > 0)
                    .sort((left, right) => right.points - left.points || right.kudosReceived - left.kudosReceived || left.name.localeCompare(right.name))
                    .slice(0, 5);

                const goal = Math.max(1, Number(appSettings.weeklyKudosGoal) || 8);

                return {
                    leaderboard,
                    totalKudos: inRangeKudos.length,
                    goal,
                    progressPercent: Math.min(100, Math.round((inRangeKudos.length / goal) * 100)),
                    challengeText: appSettings.crewChallenge || getDefaultSettings().crewChallenge,
                    hasData: leaderboard.length > 0
                };
            }, [achievementWindow, currentDate, users, staff, events, allReports, kudosWall, appSettings.weeklyKudosGoal, appSettings.crewChallenge]);

                Object.values(allReports || {}).forEach(report => {
                    if (report?.__meta?.savedAt) candidates.push(report.__meta.savedAt);

                (messages || []).forEach(message => message?.createdAt && candidates.push(message.createdAt));
                (visitationSchedule || []).forEach(item => item?.syncedAt && candidates.push(item.syncedAt));
                (dischargeList || []).forEach(item => item?.lastUpdated && candidates.push(item.lastUpdated));
                (documentLinks || []).forEach(item => item?.addedAt && candidates.push(item.addedAt));

            useEffect(() => {

            // Unconditional auto-save every 2 minutes whenever there are unsaved changes
            useEffect(() => {
                if (!isReportDirty || !currentUser) return undefined;
                const intervalId = window.setInterval(() => {
                    persistReport(reportData || {}, selectedDate, reportPriority);
                    setIsReportDirty(false);
                    setReportDirtySinceAt(null);
                    setReportLastEditAt(null);
                    showNotification(`Auto-saved shift report for ${selectedDate}.`, 'info');
                }, 120000); // every 2 minutes
                return () => window.clearInterval(intervalId);
            }, [isReportDirty, reportData, selectedDate, reportPriority, currentUser?.id]);

            useEffect(() => {
                if (!isReportDirty || !reportLastEditAt || !currentUser) return undefined;
                const idleMs = 60000;
                const elapsedMs = Date.now() - reportLastEditAt;
                const waitMs = Math.max(0, idleMs - elapsedMs);
                const timeoutId = window.setTimeout(() => {
                    const currentReadiness = getReportReadiness(reportData || {});
                    const previousReadiness = reportReadinessSnapshot;
                    const readinessImproved = !previousReadiness || 
                        currentReadiness.completion.completed > previousReadiness.completion.completed ||
                        (currentReadiness.ready && !previousReadiness.ready);
                    if (readinessImproved) {
                        persistReport(reportData || {}, selectedDate, reportPriority);
                        setIsReportDirty(false);
                        setReportDirtySinceAt(null);
                        setReportLastEditAt(null);
                        setReportReadinessSnapshot(currentReadiness);
                        showNotification(`Auto-saved draft for ${selectedDate} (readiness improved).`, 'info');
                    }
                }, waitMs);
                return () => window.clearTimeout(timeoutId);
            }, [isReportDirty, reportLastEditAt, reportData, selectedDate, reportPriority, currentUser?.id, reportReadinessSnapshot]);

            function getReportCompletion(report) {
                const completed = REPORT_FIELDS.reduce((count, field) => {
                    const value = String(report?.[field.id] || '').trim();
                    return count + (value ? 1 : 0);
                }, 0);
                return {
                    completed,
                    total: REPORT_FIELDS.length,
                    percent: Math.round((completed / REPORT_FIELDS.length) * 100)
                };
            }

            function getChecklistReadiness(checklistItems = checklist) {
                const items = Array.isArray(checklistItems) ? checklistItems : [];
                const requiredItems = items.filter(item => item?.required !== false);
                const incompleteRequiredItems = requiredItems.filter(item => !item?.checked);
                return {
                    totalItems: items.length,
                    requiredItemsCount: requiredItems.length,
                    incompleteRequiredItems
                };
            }

            function getReportReadinessIssues(readiness) {
                const issues = [];
                if (!readiness?.hasChecklistItems) {
                    issues.push('Add checklist tasks for this shift.');
                }
                if (readiness?.missingRequiredLabels?.length > 0) {
                    issues.push(`Required report fields: ${readiness.missingRequiredLabels.join(', ')}`);
                }
                if (!readiness?.meetsCoverage) {
                    issues.push(`Complete at least ${REPORT_MIN_FIELDS_FOR_SUBMIT} report sections.`);
                }
                if (!readiness?.checklistReady) {
                    if (readiness?.incompleteChecklistCount > 0) {
                        issues.push(`Finish ${readiness.incompleteChecklistCount} required checklist task${readiness.incompleteChecklistCount === 1 ? '' : 's'}.`);
                    } else {
                        issues.push('Complete all required checklist tasks.');
                    }
                }
                return issues;
            }

            function getReportReadiness(report, checklistItems = checklist) {
                const completion = getReportCompletion(report);
                const missingRequiredLabels = REPORT_SUBMIT_REQUIRED_FIELD_IDS
                    .filter(fieldId => !String(report?.[fieldId] || '').trim())
                    .map(fieldId => REPORT_FIELDS.find(field => field.id === fieldId)?.label || fieldId);
                const meetsCoverage = completion.completed >= REPORT_MIN_FIELDS_FOR_SUBMIT;
                const checklistReadiness = getChecklistReadiness(checklistItems);
                const hasChecklistItems = checklistReadiness.totalItems > 0;
                const checklistReady = hasChecklistItems && checklistReadiness.incompleteRequiredItems.length === 0;
                return {
                    ready: missingRequiredLabels.length === 0 && meetsCoverage && checklistReady,
                    missingRequiredLabels,
                    meetsCoverage,
                    completion,
                    hasChecklistItems,
                    checklistReady,
                    incompleteChecklistCount: checklistReadiness.incompleteRequiredItems.length,
                    incompleteChecklistItems: checklistReadiness.incompleteRequiredItems
                };
            }

            function getReportHandoffSummary(report) {
                const summaryFieldOrder = ['incidents', 'handoff', 'maintenance', 'visitors', 'notes'];
                const lines = summaryFieldOrder
                    .map(fieldId => {
                        const field = REPORT_FIELDS.find(item => item.id === fieldId);
                        const value = String(report?.[fieldId] || '').trim();
                        if (!value) return null;
                        const compact = value.replace(/\s+/g, ' ').slice(0, 96);
                        return `${field?.label || fieldId}: ${compact}${compact.length === 96 ? '...' : ''}`;
                    })
                    .filter(Boolean)
                    .slice(0, 3);
                return lines;
            }

            function getReportActivityTimeline(dateKey, report, dayShifts, dayChecklist) {
                const meta = report?.__meta || {};
                const entries = [];
                const addEvent = (time, label, detail) => {
                    entries.push({ time: time || 0, label, detail });
                };

                if (meta.savedAt) {
                    addEvent(meta.savedAt, 'Saved draft', meta.savedBy || 'Unknown');
                }
                if (meta.submittedAt) {
                    addEvent(meta.submittedAt, 'Submitted for review', meta.submittedBy || 'Unknown');
                }
                if (meta.approvedAt) {
                    addEvent(meta.approvedAt, 'Approved', meta.approvedBy || 'Unknown');
                }
                if (meta.rejectedAt) {
                    addEvent(meta.rejectedAt, 'Rejected', meta.rejectedBy || 'Unknown');
                }

                const totalShifts = Array.isArray(dayShifts) ? dayShifts.length : 0;
                if (totalShifts > 0) {
                    addEvent(0, 'Shift coverage', `${totalShifts} shift${totalShifts === 1 ? '' : 's'} assigned`);
                }

                const checklistItems = Array.isArray(dayChecklist) ? dayChecklist : [];
                const checklistDone = checklistItems.filter(item => !!item?.checked).length;
                if (checklistItems.length > 0) {
                    addEvent(0, 'Checklist progress', `${checklistDone}/${checklistItems.length} complete`);
                }

                entries.sort((a, b) => b.time - a.time);
                return entries.slice(0, 5);
            }

            function markReportDirty() {
                const now = Date.now();
                setReportLastEditAt(now);
                setReportDirtyClock(now);
                setIsReportDirty(previous => {
                    if (!previous) {
                        setReportDirtySinceAt(now);
                        setReportReadinessSnapshot(getReportReadiness(reportData || {}));
                    }
                    return true;
                });
            }

            function persistReport(nextReport, dateKey = selectedDate, priorityOverride) {
                const storedReports = loadFromStorage(STORAGE_KEYS.REPORTS, {});
                const currentPriority = priorityOverride || reportPriority || 'normal';
                const nextMeta = {
                    ...(nextReport.__meta || {}),
                    savedAt: Date.now(),
                    savedBy: currentUser?.displayName || currentUser?.username || 'Unknown',
                    priority: currentPriority,
                    status: nextReport.__meta?.status || 'draft'
                };
                const payload = { ...nextReport, __meta: nextMeta };
                storedReports[dateKey] = payload;
                saveToStorage(STORAGE_KEYS.REPORTS, storedReports);
                saveToStorage('report_priority_' + dateKey, currentPriority);
                // Sync this specific report to Firestore
                if (isFirebaseAvailable && db) {
                    db.collection('reports').doc(dateKey).set(payload).catch(() => {});
                }
                setAllReports(storedReports);
                if (dateKey === selectedDate) {
                    setReportData(payload);
                    setReportPriority(currentPriority);
                    setIsReportDirty(false);
                    setReportDirtySinceAt(null);
                    setReportLastEditAt(null);
                    setReportReadinessSnapshot(null);
                }
                return payload;
            }

            function submitReportForReview(dateKey = selectedDate) {
                const report = reportData || allReports[dateKey] || {};
                const readiness = getReportReadiness(report);
                if (!readiness.ready) {
                    const issues = getReportReadinessIssues(readiness);
                    showNotification(`Cannot submit yet. ${issues.join(' | ')}`, 'error', true);
                    return false;
                }
                const meta = {
                    ...report.__meta,
                    status: 'submitted',
                    submittedAt: Date.now(),
                    submittedBy: currentUser?.displayName || currentUser?.username || 'Unknown'
                };
                const updated = { ...report, __meta: meta };
                persistReport(updated, dateKey);
                showNotification(`Report submitted for review by ${meta.submittedBy}.`, 'success', true);
                // Notify admins
                if (isAdmin) {
                    showNotification(`New report available for ${dateKey}.`, 'info', true);
                }

            async function syncCalendlyEvents(dateStr = selectedDate) {
                if (!calendlyAuthToken) {
                    showNotification('Please authenticate with Calendly first.', 'error');
                    return;
                }

                const date = new Date(`${dateStr}T00:00:00`);
                const dayStart = date.toISOString();
                const dayEnd = new Date(date.getTime() + 24 * 60 * 60 * 1000).toISOString();

                showNotification(`Syncing visitation schedule for ${dateStr}...`, 'info');

                try {
                    const response = await fetch(`https://api.calendly.com/scheduled_events?min_start_time=${encodeURIComponent(dayStart)}&max_start_time=${encodeURIComponent(dayEnd)}&count=100`, {
                        headers: {
                            Authorization: `Bearer ${calendlyAuthToken}`,
                            'Content-Type': 'application/json'
                        }
                    });

                    if (!response.ok) {
                        throw new Error(`Calendly request failed (${response.status})`);
                    }

                    const payload = await response.json();
                    const collection = Array.isArray(payload?.collection) ? payload.collection : [];
                    const visits = collection.map((evt, idx) => {
                        const start = evt?.start_time ? new Date(evt.start_time) : null;
                        const end = evt?.end_time ? new Date(evt.end_time) : null;
                        const minutes = start && end ? Math.max(1, Math.round((end - start) / 60000)) : null;
                        return {
                            id: evt?.uri || `visit-${dateStr}-${idx}`,
                            date: dateStr,
                            time: start ? start.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false }) : '00:00',
                            visitor: evt?.name || 'Scheduled Visit',
                            duration: minutes ? `${minutes} min` : 'N/A',
                            patient: evt?.location?.location || evt?.status || 'Unspecified'
                        };
                    });

                    const updated = [...visitationSchedule.filter(v => v.date !== dateStr), ...visits];
                    setVisitationSchedule(updated);
                    saveToStorage('reception_visitation', updated);
                    showNotification(`Synced ${visits.length} real Calendly event(s).`, 'success', true);
                } catch (error) {
                    showNotification(`Calendly sync failed: ${error.message}`, 'error', true);
                }
            }

            function handleDischargeFileUpload(event) {
                const file = event.target.files?.[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        // Parse the file (JSON or CSV expected)
                        const content = e.target.result;
                        let parsedData = [];
                        
                        if (file.name.endsWith('.json')) {
                            parsedData = JSON.parse(content);
                        } else if (file.name.endsWith('.csv')) {
                            // Basic CSV parsing
                            const lines = content.split('\n');
                            const headers = lines[0].split(',');
                            parsedData = lines.slice(1).map(line => {
                                const values = line.split(',');
                                return headers.reduce((obj, header, idx) => {
                                    obj[header.trim()] = values[idx]?.trim() || '';
                                    return obj;
                                }, {});
                            }).filter(row => Object.values(row).some(v => v));
                        } else {
                            showNotification('Please upload JSON or CSV file', 'error');
                            return;
                        }
                        
                        // Add metadata
                        const withMeta = parsedData.map(record => ({
                            ...record,
                            uploadedAt: Date.now(),
                            status: record.Status?.toLowerCase() || 'pending'
                        }));
                        
                        setDischargeList(withMeta);
                        saveToStorage('reception_discharge_list', withMeta);
                        showNotification(`Loaded ${withMeta.length} discharge records.`, 'success', true);
                    } catch (err) {
                        showNotification(`Error parsing file: ${err.message}`, 'error');
                    }
                };
                reader.readAsText(file);
            }
