<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destiny Springs | Hub Matrix</title>
    <meta name="theme-color" content="#06b6d4">
    <link rel="manifest" href="./manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=JetBrains+Mono:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/app.css">
</head>
<body>
    <div id="root"></div>
    <script>
(function() {
            const savedTheme = localStorage.getItem('reception_settings');
            if (savedTheme) {
                try {
                    const settings = JSON.parse(savedTheme);
                    if (settings.theme && document.body) {
                        document.body.setAttribute('data-theme', settings.theme);
                    }
                } catch (e) {
                    // Silently fail - React will set the theme
                }
            }
        })();
    </script>
    <script type="module" src="./assets/app.js"></script>
</body>
</html>
